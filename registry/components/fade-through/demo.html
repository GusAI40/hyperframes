<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Fade Through - Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }
      #demo {
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        font-family: Inter, system-ui, sans-serif;
        color: white;
      }
      .scene {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        font-size: 112px;
        font-weight: 900;
      }
      .a {
        background: linear-gradient(135deg, #243b55, #141e30);
      }
      .b {
        background: linear-gradient(135deg, #1d976c, #93f9b9);
        color: #073f2e;
        opacity: 0;
      }
      .hf-fade-through-wash {
        position: absolute;
        inset: 0;
        opacity: 0;
        pointer-events: none;
        background: #f8f5ec;
        z-index: 900;
      }
    </style>
  </head>
  <body>
    <div
      id="demo"
      data-composition-id="fade-through-demo"
      data-width="1920"
      data-height="1080"
      data-duration="5"
    >
      <div class="scene a hf-fade-through-out">Before</div>
      <div class="scene b hf-fade-through-in">After</div>
      <div class="hf-fade-through-wash" aria-hidden="true"></div>
      <script>
        const tl = gsap.timeline({ paused: true });
        tl.to(".hf-fade-through-out", { opacity: 0, duration: 0.45, ease: "power2.inOut" }, 1.3);
        tl.to(".hf-fade-through-wash", { opacity: 1, duration: 0.35, ease: "power2.inOut" }, 1.3);
        tl.to(".hf-fade-through-wash", { opacity: 0, duration: 0.45, ease: "power2.inOut" }, 1.65);
        tl.to(".hf-fade-through-in", { opacity: 1, duration: 0.55, ease: "power2.out" }, 1.65);
        window.__timelines = window.__timelines || {};
        window.__timelines["fade-through-demo"] = tl;
      </script>
    </div>
  </body>
</html>
