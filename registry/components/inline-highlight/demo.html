<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Inline Highlight - Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }
      #demo {
        width: 1920px;
        height: 1080px;
        display: grid;
        place-items: center;
        background: #fffaf0;
        color: #171717;
        font-family: Inter, system-ui, sans-serif;
      }
      .copy {
        width: 1300px;
        font-size: 86px;
        line-height: 1.12;
        font-weight: 820;
        letter-spacing: -0.02em;
      }
      .hf-inline-highlight {
        --hf-highlight-scale: 0;
        --hf-highlight-color: #ffe66d;
        position: relative;
        display: inline;
        z-index: 0;
      }
      .hf-inline-highlight::after {
        content: "";
        position: absolute;
        left: -0.08em;
        right: -0.08em;
        bottom: 0.05em;
        height: 0.38em;
        background: var(--hf-highlight-color);
        transform: scaleX(var(--hf-highlight-scale));
        transform-origin: left center;
        z-index: -1;
      }
    </style>
  </head>
  <body>
    <div
      id="demo"
      data-composition-id="inline-highlight-demo"
      data-width="1920"
      data-height="1080"
      data-duration="4"
    >
      <div class="copy">
        Turn the important words into
        <span class="hf-inline-highlight">animated emphasis</span> without rebuilding the scene.
      </div>
      <script>
        const tl = gsap.timeline({ paused: true });
        tl.from(".copy", { opacity: 0, y: 24, duration: 0.55, ease: "power3.out" }, 0.3);
        tl.to(
          ".hf-inline-highlight",
          { "--hf-highlight-scale": 1, duration: 0.6, ease: "power2.out" },
          0.95,
        );
        window.__timelines = window.__timelines || {};
        window.__timelines["inline-highlight-demo"] = tl;
      </script>
    </div>
  </body>
</html>
