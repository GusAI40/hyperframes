<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>RGB Glitch Text - Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }
      #demo {
        width: 1920px;
        height: 1080px;
        display: grid;
        place-items: center;
        background: #f7f7f8;
        font-family: Inter, system-ui, sans-serif;
      }
      .demo-frame {
        display: grid;
        place-items: center;
        min-width: 900px;
        min-height: 500px;
        padding: 64px;
      }
      .hf-remocn-rgb-glitch-text {
        color: #18181b;
        font-family: Inter, system-ui, sans-serif;
        font-weight: 900;
        letter-spacing: -0.04em;
      }
      .hf-remocn-rgb-glitch-text {
        position: relative;
        width: 420px;
        height: 82px;
        font-size: 72px;
        line-height: 1;
      }
      .hf-remocn-rgb-glitch-text span,
      .hf-remocn-rgb-glitch-text strong {
        position: absolute;
        inset: 0;
      }
      .hf-remocn-rgb-glitch-text span:first-child {
        color: #ef4444;
        transform: translateX(var(--hf-glitch-red, 0px));
      }
      .hf-remocn-rgb-glitch-text span:nth-child(2) {
        color: #22d3ee;
        transform: translateX(var(--hf-glitch-blue, 0px));
      }
      .hf-remocn-rgb-glitch-text strong {
        color: #18181b;
      }
    </style>
  </head>
  <body>
    <div
      id="demo"
      data-composition-id="rgb-glitch-text-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="5"
    >
      <div class="demo-frame">
        <div class="hf-remocn-rgb-glitch-text">
          <span>GLITCH</span><span>GLITCH</span><strong>GLITCH</strong>
        </div>
      </div>
      <script>
        const tl = gsap.timeline({ paused: true });
        const startTime = 0.5;
        tl.to(".hf-remocn-rgb-glitch-text", { opacity: 1, duration: 0.01 }, startTime);
        tl.to(
          ".hf-remocn-rgb-glitch-text",
          {
            "--hf-glitch-red": "-8px",
            "--hf-glitch-blue": "8px",
            duration: 0.06,
            repeat: 5,
            yoyo: true,
            ease: "steps(1)",
          },
          startTime + 0.1,
        );
        tl.set({}, {}, 5);
        window.__timelines = window.__timelines || {};
        window.__timelines["rgb-glitch-text-demo"] = tl;
      </script>
    </div>
  </body>
</html>
