<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Matrix Decode - Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }
      #demo {
        width: 1920px;
        height: 1080px;
        display: grid;
        place-items: center;
        background: #f7f7f8;
        font-family: Inter, system-ui, sans-serif;
      }
      .demo-frame {
        display: grid;
        place-items: center;
        min-width: 900px;
        min-height: 500px;
        padding: 64px;
      }
      .hf-remocn-matrix-decode {
        color: #18181b;
        font-family: Inter, system-ui, sans-serif;
        font-weight: 900;
        letter-spacing: -0.04em;
      }
      .hf-remocn-matrix-decode {
        display: inline-flex;
        gap: 3px;
        font:
          900 64px/1 ui-monospace,
          SFMono-Regular,
          Menlo,
          monospace;
        color: #16a34a;
        text-shadow: 0 0 18px rgba(22, 163, 74, 0.28);
      }
      .hf-remocn-matrix-decode span {
        display: inline-block;
        min-width: 0.64em;
        opacity: var(--hf-matrix-opacity, 1);
      }
    </style>
  </head>
  <body>
    <div
      id="demo"
      data-composition-id="matrix-decode-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="5"
    >
      <div class="demo-frame">
        <div class="hf-remocn-matrix-decode" data-final="HYPERFRAMES">
          <span>0</span><span>0</span><span>0</span><span>0</span><span>0</span><span>0</span
          ><span>0</span><span>0</span><span>0</span><span>0</span><span>0</span>
        </div>
      </div>
      <script>
        const tl = gsap.timeline({ paused: true });
        const startTime = 0.5;
        tl.fromTo(
          ".hf-remocn-matrix-decode span",
          { opacity: 0, y: 12 },
          { opacity: 1, y: 0, duration: 0.18, stagger: 0.035, ease: "power2.out" },
          startTime,
        );
        tl.set({}, {}, 5);
        window.__timelines = window.__timelines || {};
        window.__timelines["matrix-decode-demo"] = tl;
      </script>
    </div>
  </body>
</html>
