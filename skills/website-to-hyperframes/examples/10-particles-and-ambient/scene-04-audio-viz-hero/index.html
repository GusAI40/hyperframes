<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>scene-04-audio-viz-hero</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet"
  />
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #06060a; }

    [data-composition-id="scene-04-audio-viz-hero"] {
      position: relative;
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: radial-gradient(ellipse 1400px 900px at 50% 80%, #1a1416 0%, #06060a 70%);
      font-family: "Inter", -apple-system, sans-serif;
      color: #f0f0f0;
    }

    /* === Top + bottom rails (editorial frame) === */
    .rail {
      position: absolute;
      left: 56px; right: 56px;
      height: 1px;
      background: rgba(255, 255, 255, 0.12);
    }
    .rail.top { top: 56px; }
    .rail.bottom { bottom: 56px; }

    /* === Corner telemetry HUD === */
    .corner {
      position: absolute;
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-family: "JetBrains Mono", monospace;
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .corner.tl { top: 80px; left: 80px; }
    .corner.tr { top: 80px; right: 80px; text-align: right; }
    .corner.bl { bottom: 80px; left: 80px; }
    .corner.br { bottom: 80px; right: 80px; text-align: right; }

    .corner .mono { color: rgba(255,255,255,0.5); }
    .corner .mono.amber { color: #f59e0b; }
    .corner .mono.dim { color: rgba(255,255,255,0.25); }
    .corner .mono.dot { color: rgba(255,255,255,0.35); }
    .corner .mono.large {
      font-size: 56px;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: #f59e0b;
      text-transform: none;
    }
    .corner .mono.peak-label {
      font-size: 11px;
      color: rgba(245, 158, 11, 0.55);
      letter-spacing: 0.16em;
    }

    /* === Beat grid (32 ticks across top) === */
    .beat-grid {
      position: absolute;
      top: 168px; left: 0; right: 0;
      display: flex;
      justify-content: center;
      gap: 8px;
    }
    .tick {
      width: 14px;
      height: 14px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .tick.on { background: #f59e0b; border-color: #f59e0b; box-shadow: 0 0 10px rgba(245, 158, 11, 0.6); }
    .tick.down { background: rgba(245, 158, 11, 0.3); border-color: rgba(245, 158, 11, 0.3); }

    /* === Spectrum bars (full-bleed across center) === */
    .spectrum {
      position: absolute;
      left: 80px; right: 80px;
      top: 250px; bottom: 280px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 4px;
    }
    .bar {
      flex: 1;
      background: linear-gradient(180deg, #f59e0b 0%, #c25a3a 50%, #6b1f1f 100%);
      border-radius: 2px;
      transform-origin: bottom center;
      box-shadow: 0 0 8px rgba(245, 158, 11, 0.3);
    }

    /* === Centered hero text === */
    .hero-text {
      position: absolute;
      left: 0; right: 0;
      bottom: 130px;
      text-align: center;
      font-family: "Inter", sans-serif;
      font-weight: 900;
      font-size: 88px;
      letter-spacing: -0.025em;
      line-height: 1;
      color: #fff8e9;
      text-shadow: 0 0 40px rgba(245, 158, 11, 0.4);
    }
    .hero-text .accent {
      color: #f59e0b;
      font-style: italic;
      font-weight: 700;
    }

    /* === Sub-caption === */
    .sub-text {
      position: absolute;
      left: 0; right: 0;
      bottom: 80px;
      text-align: center;
      font-family: "JetBrains Mono", monospace;
      font-size: 13px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
    }

    .scene-label {
      position: absolute;
      left: 24px; bottom: 18px;
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.06em;
    }
    .scene-label b { color: rgba(255,255,255,0.6); }
  </style>
</head>
<body>
  <div
    id="scene-04-audio-viz-hero"
    data-composition-id="scene-04-audio-viz-hero"
    data-start="0"
    data-duration="7"
    data-width="1920"
    data-height="1080"
  >
    <div class="rail top"></div>
    <div class="rail bottom"></div>

    <!-- Corner telemetry -->
    <div class="corner tl">
      <span class="mono amber">ACCENT</span>
      <span class="mono dot">·</span>
      <span class="mono dim">DOWNBEAT 05 / 11</span>
    </div>
    <div class="corner tr">
      <span class="mono dim">TRIGGER</span>
      <span class="mono">KICK + SNARE</span>
    </div>
    <div class="corner bl">
      <span class="mono dim">INSERT</span>
      <span class="mono">FREQ · 80HZ — 4KHZ</span>
    </div>
    <div class="corner br">
      <span class="mono large" id="peak-num">0.91</span>
      <span class="mono peak-label">PEAK · LUFS-S</span>
    </div>

    <!-- Beat grid (32 ticks) -->
    <div class="beat-grid" id="beat-grid"></div>

    <!-- Spectrum bars (40 bars, pre-rendered) -->
    <div class="spectrum" id="spectrum"></div>

    <!-- Hero text -->
    <div class="hero-text">
      <span class="accent">Beat</span> drop.
    </div>

    <div class="sub-text">SECTION 10 · DETERMINISTIC AUDIO-VIZ · 40-BAR SPECTRUM</div>

    <div class="scene-label">Section 10 · <b>Audio-Viz Hero</b> · beat grid + spectrum bars + telemetry corners</div>
  </div>

  <script>
    (function () {
      var BEAT = 7;
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });

      // === Build the beat grid + spectrum bars in DOM (NOT in timeline callbacks) ===
      var grid = document.getElementById("beat-grid");
      // 32 ticks with pre-set classes per a deterministic pattern (some ON, some DOWN, some empty)
      var pattern = ["on","on","down","on","","on","down","on","","on","down","on","","on","","down","on","","on","","down","on","","","on","","","","on","","on",""];
      for (var i = 0; i < 32; i++) {
        var t = document.createElement("span");
        t.className = "tick" + (pattern[i] ? " " + pattern[i] : "");
        grid.appendChild(t);
      }

      // 40 spectrum bars, pre-rendered with deterministic heights (no random — seeded values)
      var spectrum = document.getElementById("spectrum");
      var heights = [
        18, 28, 22, 45, 38, 62, 48, 75, 88, 70, 92, 78, 95, 82, 110, 95, 125, 105, 140, 118,
        145, 122, 130, 108, 118, 95, 105, 85, 92, 72, 78, 60, 65, 48, 52, 38, 42, 28, 32, 20
      ];
      var bars = [];
      for (var i = 0; i < 40; i++) {
        var b = document.createElement("div");
        b.className = "bar";
        b.style.height = heights[i] + "px";
        spectrum.appendChild(b);
        bars.push(b);
      }

      // === Animation timeline ===
      // 0.0s: corner telemetry fades in (the editorial frame establishes first)
      tl.fromTo([".rail", ".corner", ".sub-text"],
        { opacity: 0, y: -4 },
        { opacity: 1, y: 0, duration: 0.5, stagger: 0.04, ease: "power2.out" }, 0);

      // 0.3s: beat-grid ticks appear with stagger (eye scans left to right)
      tl.fromTo(".tick",
        { opacity: 0, scaleY: 0, transformOrigin: "center" },
        { opacity: 1, scaleY: 1, duration: 0.25, stagger: 0.012, ease: "back.out(2)" }, 0.3);

      // 0.7s: spectrum bars rise from 0 (the "drop" moment — back.out gives that satisfying whip)
      bars.forEach(function (bar, i) {
        var targetH = heights[i];
        var delay = 0.7 + i * 0.012;
        tl.fromTo(bar,
          { scaleY: 0, transformOrigin: "bottom center" },
          { scaleY: 1, duration: 0.4, ease: "back.out(1.6)" }, delay);
      });

      // 1.7s: hero text drops in (back.out overshoot — the "boom")
      tl.fromTo(".hero-text",
        { opacity: 0, scale: 0.85, y: 20 },
        { opacity: 1, scale: 1, y: 0, duration: 0.7, ease: "back.out(1.4)" }, 1.7);

      // 2.2-6.0s: continuous beat-driven motion ===
      // Bars pulse on each "downbeat" — pre-scheduled at t=2.5, 3.0, 3.5, 4.0, 4.5, 5.0, 5.5
      var beatTimes = [2.5, 3.0, 3.5, 4.0, 4.5, 5.0, 5.5];
      beatTimes.forEach(function (t, idx) {
        // Random-ish (but deterministic) bar group pulses on each beat
        var startIdx = (idx * 7) % 40;
        var groupSize = 8 + (idx % 3) * 2;
        for (var j = 0; j < groupSize; j++) {
          var barIdx = (startIdx + j) % 40;
          tl.to(bars[barIdx], { scaleY: 1.3, duration: 0.1, ease: "power2.out" }, t);
          tl.to(bars[barIdx], { scaleY: 1, duration: 0.3, ease: "power2.in" }, t + 0.1);
        }

        // Beat-grid tick brightens
        var tickIdx = (idx * 3 + 2) % 32;
        var tick = grid.children[tickIdx];
        tl.to(tick, { scale: 1.4, duration: 0.1, ease: "power2.out" }, t);
        tl.to(tick, { scale: 1, duration: 0.3, ease: "power2.in" }, t + 0.1);

        // Hero text breath on each beat
        tl.to(".hero-text", { scale: 1.025, duration: 0.1, ease: "power2.out" }, t);
        tl.to(".hero-text", { scale: 1, duration: 0.3, ease: "power2.in" }, t + 0.1);
      });

      // Peak number counter ticks up on each beat (deterministic counter pattern)
      var peakNum = document.getElementById("peak-num");
      var peakValues = ["0.91", "0.93", "0.96", "0.94", "0.97", "0.99", "0.95", "0.98"];
      peakValues.forEach(function (v, i) {
        tl.set(peakNum, { textContent: v }, 1.7 + i * 0.55);
      });

      // 6.0-7.0s: final hold + slow gradient drift on bars
      tl.to(".bar", { opacity: 0.9, duration: 0.5, ease: "sine.inOut", stagger: 0.015 }, 6.0);

      window.__timelines["scene-04-audio-viz-hero"] = tl;
    })();
  </script>
</body>
</html>
