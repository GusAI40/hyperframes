<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>scene-02-ripple-shader-transition</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet"
  />
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; }

    [data-composition-id="scene-02-ripple-shader-transition"] {
      position: relative;
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: #000;
      font-family: "Inter", -apple-system, sans-serif;
      color: #f0f0f0;
    }

    /* === The two beats stacked === */
    .beat {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    /* Beat A: cool blue underwater feel */
    .beat-a {
      background: linear-gradient(180deg, #0a3a5e 0%, #0b6a8a 50%, #1a8eb0 100%);
    }
    .beat-a .label {
      font-family: "JetBrains Mono", monospace;
      font-size: 13px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.6);
      margin-bottom: 20px;
    }
    .beat-a .hero {
      font-size: 240px;
      font-weight: 900;
      letter-spacing: -0.04em;
      color: #fff;
      line-height: 0.9;
      text-shadow: 0 12px 40px rgba(0,0,0,0.3);
    }
    .beat-a .sub {
      font-family: "JetBrains Mono", monospace;
      font-size: 16px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
      margin-top: 24px;
    }

    /* Beat B: warm amber sunset feel */
    .beat-b {
      background: linear-gradient(180deg, #9a3a2a 0%, #d97757 50%, #f59e0b 100%);
      opacity: 0;
    }
    .beat-b .label {
      font-family: "JetBrains Mono", monospace;
      font-size: 13px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: rgba(255,248,233,0.7);
      margin-bottom: 20px;
    }
    .beat-b .hero {
      font-size: 240px;
      font-weight: 900;
      letter-spacing: -0.04em;
      color: #fff8e9;
      line-height: 0.9;
      text-shadow: 0 12px 40px rgba(0,0,0,0.3);
    }
    .beat-b .sub {
      font-family: "JetBrains Mono", monospace;
      font-size: 16px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(255,248,233,0.6);
      margin-top: 24px;
    }

    /* === Ripple canvas — fragment shader (or Canvas 2D fallback) draws here on top during transition === */
    .ripple-canvas {
      position: absolute;
      inset: 0;
      width: 1920px;
      height: 1080px;
      pointer-events: none;
      opacity: 0;
      mix-blend-mode: screen;
    }

    /* === Transition meta corner === */
    .transition-meta {
      position: absolute;
      bottom: 28px; right: 32px;
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      z-index: 50;
    }

    .scene-label {
      position: absolute;
      left: 24px; bottom: 18px;
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.06em;
      z-index: 50;
    }
    .scene-label b { color: rgba(255,255,255,0.7); }
  </style>
</head>
<body>
  <div
    id="scene-02-ripple-shader-transition"
    data-composition-id="scene-02-ripple-shader-transition"
    data-start="0"
    data-duration="6"
    data-width="1920"
    data-height="1080"
  >
    <!-- Beat A: BEFORE -->
    <div class="beat beat-a" id="beat-a">
      <div class="label">SCENE A</div>
      <div class="hero">UNDER</div>
      <div class="sub">ocean depth · 80m</div>
    </div>

    <!-- Beat B: AFTER -->
    <div class="beat beat-b" id="beat-b">
      <div class="label">SCENE B</div>
      <div class="hero">OVER</div>
      <div class="sub">surface light · 0m</div>
    </div>

    <!-- Ripple canvas drawn during the transition window only -->
    <canvas class="ripple-canvas" id="ripple-canvas" width="1920" height="1080"></canvas>

    <div class="transition-meta">RIPPLE TRANSITION · 2.0s WINDOW · CENTERED ORIGIN</div>
    <div class="scene-label">Section 05 · <b>Ripple Shader Transition</b> · Canvas 2D ripple distortion between A → B</div>
  </div>

  <script>
    (function () {
      var BEAT = 6;
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });

      var canvas = document.getElementById("ripple-canvas");
      var ctx = canvas.getContext("2d");
      var W = 1920, H = 1080;
      var CX = W / 2, CY = H / 2;

      // === Render the ripple at a given time u ∈ [0, 1] ===
      // The "ripple" is concentric expanding circles drawn with additive blending,
      // simulating what a fragment shader would do with a radial wave + chromatic offset.
      function renderRipple(u) {
        ctx.clearRect(0, 0, W, H);
        if (u <= 0 || u >= 1) return;

        // Bell-curve intensity: starts at 0, peaks at u=0.5, returns to 0
        var intensity = Math.sin(u * Math.PI);
        var maxR = Math.hypot(W, H) * 1.1;

        // Draw 8 concentric expanding rings
        for (var i = 0; i < 8; i++) {
          var phase = (u + i * 0.08) % 1;
          var radius = phase * maxR;
          var ringIntensity = intensity * (1 - phase) * 0.8;

          if (ringIntensity <= 0.05) continue;

          // Three offset rings simulating chromatic aberration (R, G, B channels)
          ["#ff5a4a", "#5aff8a", "#5a8aff"].forEach(function (color, ch) {
            ctx.strokeStyle = color;
            ctx.globalAlpha = ringIntensity * (0.4 - ch * 0.05);
            ctx.lineWidth = 6 + ringIntensity * 18;
            ctx.beginPath();
            ctx.arc(CX, CY, radius + ch * 4, 0, Math.PI * 2);
            ctx.stroke();
          });
        }

        // Central flash at peak
        if (intensity > 0.5) {
          var flash = (intensity - 0.5) * 2;
          var grad = ctx.createRadialGradient(CX, CY, 0, CX, CY, 280);
          grad.addColorStop(0, "rgba(255, 255, 255, " + (flash * 0.6) + ")");
          grad.addColorStop(0.5, "rgba(255, 230, 180, " + (flash * 0.3) + ")");
          grad.addColorStop(1, "rgba(255, 255, 255, 0)");
          ctx.globalAlpha = 1;
          ctx.fillStyle = grad;
          ctx.fillRect(0, 0, W, H);
        }

        ctx.globalAlpha = 1;
      }

      // === Timeline ===
      // Beat A holds (0-1.5s), ripple sweeps in (1.5-3.5s), Beat B holds (3.5-6.0s)

      // 0.0s: beat-a fades in
      tl.fromTo("#beat-a",
        { opacity: 0 },
        { opacity: 1, duration: 0.4, ease: "power2.out" }, 0);

      // 0.2s: hero text in beat A entrance
      tl.fromTo("#beat-a .hero",
        { opacity: 0, scale: 1.2 },
        { opacity: 1, scale: 1, duration: 0.6, ease: "expo.out" }, 0.2);

      // 0.4s: label + sub
      tl.fromTo(["#beat-a .label", "#beat-a .sub"],
        { opacity: 0, y: 10 },
        { opacity: 1, y: 0, duration: 0.5, stagger: 0.1, ease: "power2.out" }, 0.4);

      // === Ripple transition window: 1.5-3.5s ===
      // Canvas fades in
      tl.to("#ripple-canvas", { opacity: 1, duration: 0.3, ease: "power2.out" }, 1.5);

      // Drive ripple render via gsap.ticker reading tl.time() (NOT onUpdate — must work under tl.seek())
      var rippleStart = 1.5;
      var rippleEnd = 3.5;
      function tickRipple() {
        var t = tl.time();
        if (t < rippleStart || t > rippleEnd + 0.2) {
          ctx.clearRect(0, 0, W, H);
          return;
        }
        var u = (t - rippleStart) / (rippleEnd - rippleStart);
        u = Math.max(0, Math.min(1, u));
        renderRipple(u);
      }
      gsap.ticker.add(tickRipple);

      // 2.3s (mid-ripple, peak distortion): beat-a fades to 0, beat-b fades in
      tl.to("#beat-a", { opacity: 0, duration: 0.6, ease: "power2.in" }, 2.3);
      tl.to("#beat-b", { opacity: 1, duration: 0.6, ease: "power2.out" }, 2.3);

      // 3.5s: ripple canvas fades out
      tl.to("#ripple-canvas", { opacity: 0, duration: 0.3, ease: "power2.in" }, 3.5);

      // 3.8s: beat-b hero "settles" — scale-bounce entrance once revealed
      tl.fromTo("#beat-b .hero",
        { scale: 0.92 },
        { scale: 1, duration: 0.6, ease: "back.out(1.6)" }, 3.6);

      // 4.0s: beat-b label + sub settle
      tl.fromTo(["#beat-b .label", "#beat-b .sub"],
        { y: 6, opacity: 0 },
        { y: 0, opacity: 1, duration: 0.5, stagger: 0.08, ease: "power2.out" }, 3.9);

      // 4.5s onward: gentle Ken Burns drift on beat-b background
      tl.to("#beat-b", { scale: 1.03, duration: 1.5, ease: "sine.inOut", yoyo: true, repeat: 1 }, 4.5);

      window.__timelines["scene-02-ripple-shader-transition"] = tl;
    })();
  </script>
</body>
</html>
