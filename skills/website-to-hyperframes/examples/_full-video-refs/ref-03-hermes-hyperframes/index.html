<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Hermes × Hyperframes</title>
    <style>
      html, body { margin: 0; padding: 0; background: #000; }
      #el-fade {
        position: absolute;
        inset: 0;
        background: #000;
        opacity: 0;
        pointer-events: none;
        z-index: 99;
      }
    </style>
  </head>
  <body>
    <div data-composition-id="root" data-width="1080" data-height="1080" data-start="0" data-duration="41.0">

      <!-- 20-beat parade — single sub-composition -->
      <div
        id="el-parade"
        data-composition-id="parade"
        data-composition-src="compositions/parade.html"
        data-start="0"
        data-duration="41.0"
        data-track-index="0"
        style="z-index: 1"
      ></div>

      <!-- Lower-third captions overlay -->
      <div
        id="el-captions"
        data-composition-id="captions"
        data-composition-src="compositions/captions.html"
        data-start="0"
        data-duration="41.0"
        data-track-index="1"
        style="z-index: 2"
      ></div>

      <!-- Background music — KITT vs KARR. Volume ducked under VO. -->
      <audio
        id="el-bgm"
        src="assets/bg-music.wav"
        data-start="0"
        data-duration="41.0"
        data-track-index="2"
        data-volume="0.3"
      ></audio>

      <!-- Voiceover — Hermes Narrator (eleven_multilingual_v2, atempo 0.90) -->
      <audio
        id="el-vo"
        src="assets/vo.mp3"
        data-start="0"
        data-duration="41.0"
        data-track-index="3"
        data-volume="1.0"
      ></audio>

      <!-- Fade-to-black overlay — fades in 0.5s before end of video. -->
      <div id="el-fade"></div>

      <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
      <script>
        window.__timelines = window.__timelines || {};
        // Master timeline drives the fade-out overlay over the final 0.5s.
        const rootTl = gsap.timeline({ paused: true });
        rootTl.to({}, { duration: 41.0, ease: 'none' }, 0);
        rootTl.fromTo('#el-fade',
          { opacity: 0 },
          { opacity: 1, duration: 0.5, ease: 'power2.in' },
          40.5
        );
        // Hard kill at end so the fade is locked at full black.
        rootTl.set('#el-fade', { opacity: 1 }, 41.0);
        window.__timelines["root"] = rootTl;
      </script>
    </div>
  </body>
</html>
