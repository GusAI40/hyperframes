<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Anamorphic CRT — standalone (4s loop)</title>
<style>
  html, body { margin: 0; padding: 0; background: #000; height: 100%; overflow: hidden; }
  #canvas { display: block; width: 100vw; height: 100vh; background: #000; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<script>
(async () => {
  try {
    const THREE = await import('https://cdn.jsdelivr.net/npm/three@0.165.0/+esm');
    const { FontLoader } = await import('https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/loaders/FontLoader.js/+esm');
    const { TextGeometry } = await import('https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/geometries/TextGeometry.js/+esm');
    const { Brush, Evaluator, INTERSECTION } = await import('https://cdn.jsdelivr.net/npm/three-bvh-csg@0.0.18/+esm');

    const canvas = document.getElementById('canvas');
    const cssW = canvas.clientWidth || window.innerWidth;
    const cssH = canvas.clientHeight || window.innerHeight;

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(2, window.devicePixelRatio || 1));
    renderer.setSize(cssW, cssH, false);
    renderer.setClearColor(0x000000, 1);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);
    const aspect = cssW / cssH;
    const camHeight = 1400;
    const camWidth = camHeight * aspect;
    const camera = new THREE.OrthographicCamera(
      -camWidth / 2, camWidth / 2,
      camHeight / 2, -camHeight / 2,
      -5000, 5000
    );
    camera.position.set(0, 0, 1000);
    camera.lookAt(0, 0, 0);

    scene.add(new THREE.AmbientLight(0xaec3b0, 0.7));
    const keyLight = new THREE.DirectionalLight(0xeff6e0, 1.2);
    keyLight.position.set(400, 600, 800);
    scene.add(keyLight);
    const fillLight = new THREE.DirectionalLight(0x778DA9, 0.5);
    fillLight.position.set(-500, -200, 400);
    scene.add(fillLight);

    const material = new THREE.MeshStandardMaterial({
      color: 0xE5E1DD,
      metalness: 0.15,
      roughness: 0.45,
    });

    const stage = new THREE.Group();
    scene.add(stage);

    const WORD1 = 'HYPERFRAMES';
    const WORD2 = 'HERMES';
    const TEXT_SIZE = 200;
    const FONT_URL = 'https://cdn.jsdelivr.net/npm/three@0.165.0/examples/fonts/helvetiker_bold.typeface.json';

    const font = await new Promise((resolve, reject) => {
      new FontLoader().load(FONT_URL, resolve, undefined, reject);
    });

    const word1Stripped = WORD1.replace(/\s/g, '');
    const word2Stripped = WORD2.replace(/\s/g, '');

    // pairWords algorithm — same as production comp
    const pairWords = (shorter, longer) => {
      if (shorter.length > longer.length) {
        return pairWords(longer, shorter).map(([a, b]) => [b, a]);
      }
      const result = [];
      const m = shorter.length;
      const n = longer.length;
      let prev = 0;
      for (let i = 1; i <= m; i++) {
        const next = Math.round((i * n) / m);
        const group = longer.slice(prev, next);
        result.push([[shorter[i - 1]], group]);
        prev = next;
      }
      return result;
    };

    const measureChunk = (text) => {
      const shapes = font.generateShapes(text, TEXT_SIZE);
      const geom = new THREE.ShapeGeometry(shapes);
      geom.computeBoundingBox();
      const bb = geom.boundingBox;
      geom.dispose();
      return {
        text,
        width: bb.max.x - bb.min.x,
        minX: bb.min.x,
        minY: bb.min.y,
        maxY: bb.max.y,
      };
    };

    const advanceScale = TEXT_SIZE / font.data.resolution;
    const advanceOf = (text) => {
      let total = 0;
      for (const c of text) {
        const g = font.data.glyphs[c];
        if (g) total += g.ha;
      }
      return total * advanceScale;
    };

    const computeMeasurements = (chunks) => {
      const result = [];
      let cumulativeAdvance = 0;
      for (const chunk of chunks) {
        const text = chunk.join('');
        const m = measureChunk(text);
        result.push({ ...m, position: cumulativeAdvance, advance: advanceOf(text) });
        cumulativeAdvance += advanceOf(text);
      }
      return result;
    };

    const pairs = pairWords(word1Stripped.split(''), word2Stripped.split(''));
    const [chunks1, chunks2] = (() => {
      const a = [], b = [];
      for (const [x, y] of pairs) { a.push(x); b.push(y); }
      return [a, b];
    })();

    const m1Arr = computeMeasurements(chunks1);
    const m2Arr = computeMeasurements(chunks2);

    const fullM1 = measureChunk(word1Stripped);
    const fullM2 = measureChunk(word2Stripped);
    const totalWidth1 = advanceOf(word1Stripped);
    const totalWidth2 = advanceOf(word2Stripped);
    const extrudeMargin = 30;
    const charHeight = fullM1.maxY - fullM1.minY;

    const makeExtrudedText = (text, depth) => {
      return new TextGeometry(text, {
        font,
        size: TEXT_SIZE,
        depth,
        curveSegments: 4,
        bevelEnabled: false,
      });
    };

    const evaluator = new Evaluator();
    evaluator.useGroups = false;

    for (let i = 0; i < pairs.length; i++) {
      const c1 = m1Arr[i];
      const c2 = m2Arr[i];

      const g1 = makeExtrudedText(c1.text, totalWidth2 + extrudeMargin);
      g1.translate(0, 0, -(totalWidth2 + extrudeMargin) / 2);

      const g2 = makeExtrudedText(c2.text, totalWidth1 + extrudeMargin);
      g2.translate(0, 0, -(totalWidth1 + extrudeMargin) / 2);

      const brush1 = new Brush(g1);
      brush1.updateMatrixWorld();

      const brush2 = new Brush(g2);
      brush2.rotation.y = Math.PI / 2;
      brush2.updateMatrixWorld();

      try {
        const intersected = evaluator.evaluate(brush1, brush2, INTERSECTION);
        intersected.material = material;
        intersected.position.set(
          c1.position - totalWidth1 / 2,
          0,
          -c2.position + totalWidth2 / 2
        );
        stage.add(intersected);
      } catch (err) {
        console.warn('CSG failed for pair', i, c1.text, c2.text, err.message);
      }
    }

    stage.position.set(0, -charHeight / 2 - fullM1.minY, 0);

    // 4-second auto-loop with hold-rotate-hold pattern
    let t0 = performance.now();
    function loop() {
      const elapsed = (performance.now() - t0) / 1000;
      const t = elapsed % 4.0;
      let rot;
      if (t < 0.4) {
        rot = 0;
      } else if (t > 3.6) {
        rot = -Math.PI / 2;
      } else {
        const u = (t - 0.4) / 3.2;
        // ease in-out quad (matches the original power2.inOut)
        const eased = u < 0.5 ? 2 * u * u : 1 - Math.pow(-2 * u + 2, 2) / 2;
        rot = -eased * Math.PI / 2;
      }
      stage.rotation.y = rot;
      renderer.render(scene, camera);
      requestAnimationFrame(loop);
    }
    loop();

    // Resize handling for iframe
    const resize = () => {
      const w = canvas.clientWidth, h = canvas.clientHeight;
      const a = w / h;
      const ch = 1400, cw = ch * a;
      camera.left = -cw / 2; camera.right = cw / 2;
      camera.top = ch / 2; camera.bottom = -ch / 2;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h, false);
    };
    window.addEventListener('resize', resize);
  } catch (err) {
    console.error('[anamorphic-standalone]', err);
  }
})();
</script>
</body>
</html>
