<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>KF02 — Binary Break</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1920px;
    height: 1080px;
    background: #000;
    overflow: hidden;
    position: relative;
  }

  /* SVG turbulence filter for organic noise */
  .svg-filters { position: absolute; width: 0; height: 0; }

  /* Canvas-style binary rain background via repeating text columns */
  .rain-layer {
    position: absolute;
    inset: 0;
    z-index: 1;
    display: flex;
    gap: 0;
  }

  .rain-col {
    flex: 0 0 20px;
    font-family: 'VT323', monospace;
    font-size: 16px;
    line-height: 1.15;
    word-break: break-all;
    overflow: hidden;
    color: rgba(51, 255, 51, 0.25);
  }

  .rain-col:nth-child(6n) {
    color: rgba(51, 255, 51, 0.6);
    text-shadow: 0 0 8px rgba(51, 255, 51, 0.4);
  }

  .rain-col:nth-child(10n+3) {
    color: rgba(51, 255, 51, 0.5);
    text-shadow: 0 0 6px rgba(51, 255, 51, 0.3);
  }

  .rain-col:nth-child(15n+7) {
    color: rgba(0, 220, 170, 0.5);
    text-shadow: 0 0 8px rgba(0, 220, 170, 0.3);
  }

  /* THE SHATTER — massive glitch tear ripping across the center */
  .shatter {
    position: absolute;
    left: 0;
    top: 320px;
    width: 100%;
    height: 440px;
    z-index: 20;
    overflow: visible;
  }

  /* Displaced horizontal slices with color bleed */
  .shard {
    position: absolute;
    left: 0;
    width: 100%;
    overflow: hidden;
  }

  .shard-1 {
    top: 0; height: 35px;
    transform: translateX(140px) skewX(-2deg);
    background: linear-gradient(90deg, rgba(255, 50, 80, 0.3) 0%, rgba(0, 255, 200, 0.15) 40%, transparent 80%);
    border-bottom: 1px solid rgba(255, 50, 80, 0.4);
  }
  .shard-2 {
    top: 35px; height: 50px;
    transform: translateX(-200px) skewX(3deg);
    background: linear-gradient(90deg, transparent 10%, rgba(0, 200, 255, 0.2) 30%, rgba(255, 200, 0, 0.25) 60%, transparent 90%);
    border-top: 1px solid rgba(0, 200, 255, 0.5);
  }
  .shard-3 {
    top: 85px; height: 25px;
    transform: translateX(80px);
    background: linear-gradient(90deg, rgba(200, 0, 255, 0.25) 0%, rgba(255, 150, 0, 0.2) 50%, transparent 100%);
  }
  .shard-4 {
    top: 110px; height: 70px;
    transform: translateX(-150px) skewX(-1deg);
    background: linear-gradient(90deg, rgba(255, 255, 0, 0.15) 0%, rgba(255, 0, 200, 0.25) 30%, rgba(0, 255, 150, 0.2) 60%, transparent 100%);
    border-bottom: 2px solid rgba(255, 0, 200, 0.4);
  }
  .shard-5 {
    top: 180px; height: 40px;
    transform: translateX(220px) skewX(2deg);
    background: linear-gradient(90deg, transparent 5%, rgba(0, 255, 100, 0.3) 25%, rgba(255, 80, 0, 0.2) 55%, rgba(100, 0, 255, 0.15) 85%, transparent 100%);
    border-top: 1px solid rgba(0, 255, 100, 0.5);
  }
  .shard-6 {
    top: 220px; height: 55px;
    transform: translateX(-100px) skewX(-3deg);
    background: linear-gradient(90deg, rgba(255, 100, 50, 0.25) 0%, rgba(0, 200, 200, 0.2) 40%, rgba(200, 50, 255, 0.18) 70%, transparent 100%);
  }
  .shard-7 {
    top: 275px; height: 30px;
    transform: translateX(170px);
    background: linear-gradient(90deg, rgba(0, 150, 255, 0.3) 0%, rgba(255, 200, 0, 0.25) 35%, rgba(255, 0, 150, 0.2) 70%, transparent 100%);
    border-bottom: 1px solid rgba(0, 150, 255, 0.4);
  }
  .shard-8 {
    top: 305px; height: 65px;
    transform: translateX(-80px) skewX(1deg);
    background: linear-gradient(90deg, rgba(255, 0, 100, 0.2) 0%, rgba(0, 255, 200, 0.25) 30%, rgba(255, 255, 0, 0.15) 60%, transparent 100%);
  }
  .shard-9 {
    top: 370px; height: 40px;
    transform: translateX(250px) skewX(-2deg);
    background: linear-gradient(90deg, rgba(200, 100, 255, 0.25) 0%, rgba(0, 200, 150, 0.2) 45%, transparent 100%);
    border-top: 2px solid rgba(200, 100, 255, 0.5);
  }
  .shard-10 {
    top: 410px; height: 30px;
    transform: translateX(-180px);
    background: linear-gradient(90deg, transparent 0%, rgba(255, 150, 50, 0.3) 20%, rgba(0, 200, 255, 0.2) 50%, rgba(255, 0, 200, 0.15) 80%, transparent 100%);
  }

  /* Bright horizontal interference lines within shatter */
  .interference {
    position: absolute;
    left: 0;
    width: 100%;
    height: 2px;
    z-index: 22;
  }
  .interference-1 { top: 340px; background: rgba(255, 255, 255, 0.4); box-shadow: 0 0 10px rgba(255, 255, 255, 0.3); }
  .interference-2 { top: 500px; background: rgba(0, 255, 200, 0.5); box-shadow: 0 0 12px rgba(0, 255, 200, 0.4); width: 70%; left: 15%; }
  .interference-3 { top: 620px; background: rgba(255, 200, 0, 0.35); box-shadow: 0 0 8px rgba(255, 200, 0, 0.3); width: 85%; left: 8%; }
  .interference-4 { top: 440px; background: rgba(255, 50, 200, 0.4); box-shadow: 0 0 10px rgba(255, 50, 200, 0.3); width: 60%; left: 25%; }

  /* HYPERFRAMES — the reveal text bursting through */
  .reveal {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 40;
    text-align: center;
  }

  .reveal-title {
    font-family: 'VT323', monospace;
    font-size: 130px;
    letter-spacing: 0.12em;
    color: #FFD080;
    text-shadow:
      0 0 40px rgba(255, 208, 128, 0.7),
      0 0 80px rgba(255, 180, 70, 0.4),
      0 0 160px rgba(255, 150, 50, 0.2),
      8px 0 0 rgba(255, 0, 50, 0.25),
      -8px 0 0 rgba(0, 100, 255, 0.25),
      4px 3px 0 rgba(255, 0, 100, 0.15),
      -4px -3px 0 rgba(0, 200, 255, 0.15);
    white-space: nowrap;
    line-height: 1;
  }

  .reveal-sub {
    font-family: 'VT323', monospace;
    font-size: 36px;
    letter-spacing: 0.35em;
    color: rgba(51, 255, 51, 0.75);
    text-shadow:
      0 0 20px rgba(51, 255, 51, 0.5),
      3px 0 0 rgba(255, 0, 0, 0.1),
      -3px 0 0 rgba(0, 100, 255, 0.1);
    margin-top: 16px;
  }

  /* Chromatic ghost layers */
  .ghost {
    position: absolute;
    top: 50%;
    left: 50%;
    z-index: 35;
    font-family: 'VT323', monospace;
    font-size: 130px;
    letter-spacing: 0.12em;
    white-space: nowrap;
    line-height: 1;
  }
  .ghost-r {
    transform: translate(calc(-50% + 12px), calc(-50% - 4px));
    color: rgba(255, 30, 30, 0.12);
  }
  .ghost-b {
    transform: translate(calc(-50% - 12px), calc(-50% + 4px));
    color: rgba(30, 80, 255, 0.1);
  }

  /* Central glow burst */
  .center-burst {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 1400px;
    height: 600px;
    z-index: 10;
    background:
      radial-gradient(ellipse at center,
        rgba(255, 200, 80, 0.12) 0%,
        rgba(255, 150, 50, 0.06) 25%,
        rgba(200, 50, 200, 0.03) 50%,
        transparent 70%
      );
  }

  /* Scanlines */
  .scanlines {
    position: absolute; inset: 0; z-index: 80;
    background: repeating-linear-gradient(to bottom,
      transparent 0px, transparent 1px,
      rgba(0, 0, 0, 0.22) 1px, rgba(0, 0, 0, 0.22) 2px
    );
    pointer-events: none;
  }

  /* Vignette */
  .vignette {
    position: absolute; inset: 0; z-index: 85;
    background: radial-gradient(ellipse at center, transparent 25%, rgba(0, 0, 0, 0.7) 100%);
    pointer-events: none;
  }

  /* Color bleed edges */
  .bleed-top {
    position: absolute; top: 0; left: 0; width: 100%; height: 5px; z-index: 50;
    background: linear-gradient(90deg, rgba(255, 50, 50, 0.5), rgba(0, 255, 150, 0.5), rgba(255, 200, 0, 0.5), rgba(0, 150, 255, 0.5), rgba(255, 0, 200, 0.5));
  }
  .bleed-bottom {
    position: absolute; bottom: 0; left: 0; width: 100%; height: 6px; z-index: 50;
    background: linear-gradient(90deg, rgba(0, 200, 200, 0.6), rgba(200, 0, 200, 0.5), rgba(255, 180, 70, 0.5), rgba(0, 150, 255, 0.6));
    box-shadow: 0 0 20px rgba(200, 0, 200, 0.3);
  }
</style>
</head>
<body>
  <!-- Binary rain field — 96 columns filling 1920px -->
  <div class="rain-layer" id="rain"></div>

  <!-- Glitch shatter zone -->
  <div class="shatter">
    <div class="shard shard-1"></div>
    <div class="shard shard-2"></div>
    <div class="shard shard-3"></div>
    <div class="shard shard-4"></div>
    <div class="shard shard-5"></div>
    <div class="shard shard-6"></div>
    <div class="shard shard-7"></div>
    <div class="shard shard-8"></div>
    <div class="shard shard-9"></div>
    <div class="shard shard-10"></div>
  </div>

  <!-- Bright interference lines -->
  <div class="interference interference-1"></div>
  <div class="interference interference-2"></div>
  <div class="interference interference-3"></div>
  <div class="interference interference-4"></div>

  <!-- Central glow -->
  <div class="center-burst"></div>

  <!-- Chromatic ghosts -->
  <div class="ghost ghost-r">HYPERFRAMES</div>
  <div class="ghost ghost-b">HYPERFRAMES</div>

  <!-- Main reveal -->
  <div class="reveal">
    <div class="reveal-title">HYPERFRAMES</div>
    <div class="reveal-sub">HTML TO VIDEO</div>
  </div>

  <!-- Post-processing layers -->
  <div class="scanlines"></div>
  <div class="vignette"></div>
  <div class="bleed-top"></div>
  <div class="bleed-bottom"></div>

  <script>
    // Generate binary rain columns deterministically (seeded)
    const rainEl = document.getElementById('rain');
    const cols = 96;
    const seed = 42;
    let s = seed;
    function nextRand() { s = (s * 1103515245 + 12345) & 0x7fffffff; return s; }

    for (let i = 0; i < cols; i++) {
      const col = document.createElement('div');
      col.className = 'rain-col';
      let txt = '';
      for (let j = 0; j < 85; j++) {
        txt += nextRand() % 2 === 0 ? '0' : '1';
      }
      col.textContent = txt;
      rainEl.appendChild(col);
    }
  </script>
</body>
</html>
