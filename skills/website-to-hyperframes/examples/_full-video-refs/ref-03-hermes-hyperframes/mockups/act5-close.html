<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Act 5 — Close / Branding</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=VT323&family=IBM+Plex+Mono:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  .frame {
    width: 1920px;
    height: 1080px;
    position: relative;
    overflow: hidden;
    background: #050508;
  }

  /* ═══════════════════════════════════════════
     Radial burst background
     ═══════════════════════════════════════════ */
  .radial-burst {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at center, rgba(255, 208, 128, 0.15) 0%, transparent 40%),
      radial-gradient(ellipse at center, rgba(204, 0, 255, 0.08) 0%, transparent 55%),
      radial-gradient(ellipse at center, rgba(0, 170, 255, 0.05) 0%, transparent 65%);
  }

  /* Rotating conic rays */
  .conic-rays {
    position: absolute;
    width: 2400px;
    height: 2400px;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: conic-gradient(
      from 0deg,
      transparent 0deg, rgba(255, 208, 128, 0.03) 5deg, transparent 10deg,
      transparent 20deg, rgba(255, 208, 128, 0.02) 25deg, transparent 30deg,
      transparent 40deg, rgba(204, 0, 255, 0.02) 45deg, transparent 50deg,
      transparent 60deg, rgba(255, 208, 128, 0.03) 65deg, transparent 70deg,
      transparent 80deg, rgba(0, 170, 255, 0.02) 85deg, transparent 90deg,
      transparent 100deg, rgba(255, 208, 128, 0.02) 105deg, transparent 110deg,
      transparent 120deg, rgba(204, 0, 255, 0.03) 125deg, transparent 130deg,
      transparent 140deg, rgba(255, 208, 128, 0.02) 145deg, transparent 150deg,
      transparent 160deg, rgba(0, 170, 255, 0.02) 165deg, transparent 170deg,
      transparent 180deg, rgba(255, 208, 128, 0.03) 185deg, transparent 190deg,
      transparent 200deg, rgba(204, 0, 255, 0.02) 205deg, transparent 210deg,
      transparent 220deg, rgba(255, 208, 128, 0.02) 225deg, transparent 230deg,
      transparent 240deg, rgba(0, 170, 255, 0.03) 245deg, transparent 250deg,
      transparent 260deg, rgba(255, 208, 128, 0.02) 265deg, transparent 270deg,
      transparent 280deg, rgba(204, 0, 255, 0.02) 285deg, transparent 290deg,
      transparent 300deg, rgba(255, 208, 128, 0.03) 305deg, transparent 310deg,
      transparent 320deg, rgba(0, 170, 255, 0.02) 325deg, transparent 330deg,
      transparent 340deg, rgba(255, 208, 128, 0.02) 345deg, transparent 350deg,
      transparent 360deg
    );
    opacity: 0.8;
  }

  /* ASCII bg - subtle */
  .ascii-bg {
    position: absolute; inset: 0;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; line-height: 13px;
    color: #FFD080; opacity: 0.03;
    overflow: hidden; white-space: pre;
    pointer-events: none;
  }

  /* CRT overlays */
  .scanlines { position: absolute; inset: 0; background: repeating-linear-gradient(to bottom, transparent 0px, transparent 2px, rgba(0,0,0,0.10) 2px, rgba(0,0,0,0.10) 4px); pointer-events: none; z-index: 90; }
  .vignette { position: absolute; inset: 0; background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.5) 70%, rgba(0,0,0,0.8) 100%); pointer-events: none; z-index: 91; }
  .bleed-top, .bleed-bottom { position: absolute; left: 0; right: 0; height: 3px; z-index: 92; pointer-events: none; }
  .bleed-top { top: 0; background: linear-gradient(90deg, #FFD080 0%, #CC00FF 50%, #88BBFF 100%); opacity: 0.5; }
  .bleed-bottom { bottom: 0; background: linear-gradient(90deg, #88BBFF 0%, #CC00FF 50%, #FFD080 100%); opacity: 0.5; }

  .particles { position: absolute; inset: 0; z-index: 5; pointer-events: none; }
  .particle { position: absolute; width: 2px; height: 2px; border-radius: 50%; }

  /* ═══════════════════════════════════════════
     CONTENT: Branding lockup
     ═══════════════════════════════════════════ */
  .content {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 10;
    gap: 40px;
  }

  /* Dual logo lockup */
  .logo-lockup {
    display: flex;
    align-items: center;
    gap: 40px;
  }

  .logo-icon {
    width: 100px;
    height: 100px;
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 700;
    font-size: 36px;
    position: relative;
  }
  .logo-hf {
    background: rgba(255, 208, 128, 0.1);
    border: 1px solid rgba(255, 208, 128, 0.3);
    color: #FFD080;
    box-shadow:
      0 0 20px rgba(255, 208, 128, 0.15),
      inset 0 0 20px rgba(255, 208, 128, 0.05);
  }
  .logo-nous {
    background: rgba(136, 187, 255, 0.1);
    border: 1px solid rgba(136, 187, 255, 0.3);
    color: #88BBFF;
    box-shadow:
      0 0 20px rgba(136, 187, 255, 0.15),
      inset 0 0 20px rgba(136, 187, 255, 0.05);
  }
  /* Chromatic glow ring around icons */
  .logo-icon::after {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 24px;
    border: 1px solid transparent;
    background: conic-gradient(from 0deg, rgba(255,50,50,0.2), rgba(50,255,50,0.2), rgba(50,50,255,0.2), rgba(255,50,50,0.2)) border-box;
    -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
    mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
  }

  .logo-x {
    font-family: 'VT323', monospace;
    font-size: 48px;
    color: #555;
  }

  .brand-labels {
    display: flex;
    gap: 80px;
    margin-top: -20px;
  }
  .brand-label {
    font-family: 'VT323', monospace;
    font-size: 20px;
    letter-spacing: 4px;
    text-align: center;
  }
  .brand-label.hf { color: #FFD080; }
  .brand-label.nous { color: #88BBFF; }

  /* Hero text */
  .hero-line {
    font-family: 'VT323', monospace;
    font-size: 64px;
    color: #fff;
    letter-spacing: 4px;
    text-shadow:
      0 0 20px rgba(255,255,255,0.3),
      0 0 50px rgba(255, 208, 128, 0.2);
    text-align: center;
    margin-top: 20px;
    position: relative;
  }
  .hero-line::before {
    content: 'YOUR AGENT MAKES VIDEOS NOW.';
    position: absolute; top: 0; left: 0; width: 100%;
    color: rgba(255, 50, 50, 0.2);
    transform: translate(-3px, -1px);
  }
  .hero-line::after {
    content: 'YOUR AGENT MAKES VIDEOS NOW.';
    position: absolute; top: 0; left: 0; width: 100%;
    color: rgba(50, 100, 255, 0.2);
    transform: translate(3px, 1px);
  }

  /* Bottom meta */
  .meta-strip {
    position: absolute;
    bottom: 60px;
    left: 0; right: 0;
    text-align: center;
    z-index: 20;
  }
  .meta-line-1 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 16px;
    color: #33FF33;
    letter-spacing: 4px;
    text-shadow: 0 0 8px rgba(51, 255, 51, 0.4);
  }
  .meta-line-2 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    color: #666;
    letter-spacing: 3px;
    margin-top: 8px;
  }
</style>
</head>
<body>
  <div class="frame">
    <div class="radial-burst"></div>
    <div class="conic-rays"></div>
    <div class="ascii-bg" id="asciiBg"></div>
    <div class="particles" id="particles"></div>

    <div class="content">
      <div class="logo-lockup">
        <div class="logo-icon logo-hf">&lt;/&gt;</div>
        <div class="logo-x">×</div>
        <div class="logo-icon logo-nous">N</div>
      </div>

      <div class="brand-labels">
        <div class="brand-label hf">HYPERFRAMES</div>
        <div class="brand-label nous">HERMES AGENT</div>
      </div>

      <div class="hero-line">YOUR AGENT MAKES VIDEOS NOW.</div>
    </div>

    <div class="meta-strip">
      <div class="meta-line-1">OPEN SOURCE · APACHE-2.0</div>
      <div class="meta-line-2">HERMES-AGENT.NOUSRESEARCH.COM · WORKS WITH 35+ AGENTS</div>
    </div>

    <div class="scanlines"></div>
    <div class="vignette"></div>
    <div class="bleed-top"></div>
    <div class="bleed-bottom"></div>
  </div>

  <script>
    const chars = '·•○◦◇◆□■△▽▲▼★☆✦✧⬡⬢◈●◉⌂';
    const cols = 200; const rows = 90;
    let bg = '';
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) bg += chars[Math.floor(Math.random() * chars.length)];
      bg += '\n';
    }
    document.getElementById('asciiBg').textContent = bg;

    const colors = ['#FFD080', '#88BBFF', '#CC00FF', '#33FF33', '#FF6600', '#00DDAA'];
    const container = document.getElementById('particles');
    for (let i = 0; i < 140; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + '%';
      p.style.top = Math.random() * 100 + '%';
      p.style.background = colors[Math.floor(Math.random() * colors.length)];
      p.style.opacity = 0.1 + Math.random() * 0.3;
      container.appendChild(p);
    }
  </script>
</body>
</html>
