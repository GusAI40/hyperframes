<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Act 3 — What It Makes (Showcase)</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=VT323&family=IBM+Plex+Mono:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  .frame {
    width: 1920px;
    height: 1080px;
    position: relative;
    overflow: hidden;
    background: #050508;
  }

  /* This mockup shows 1 of 4-5 rapid-cut showcase frames.
     Each would be a full-bleed visual spectacle.
     This one: Domain-warp shader art + ASCII overlay */

  /* ═══════════════════════════════════════════
     LAYER 1: Shader background (simulated with CSS gradients)
     ═══════════════════════════════════════════ */
  .shader-bg {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 25% 30%, rgba(204, 0, 255, 0.6) 0%, transparent 40%),
      radial-gradient(ellipse at 75% 70%, rgba(255, 100, 0, 0.5) 0%, transparent 45%),
      radial-gradient(ellipse at 50% 50%, rgba(0, 170, 255, 0.4) 0%, transparent 50%),
      radial-gradient(ellipse at 35% 80%, rgba(0, 221, 170, 0.3) 0%, transparent 35%),
      radial-gradient(ellipse at 65% 20%, rgba(255, 208, 128, 0.35) 0%, transparent 40%);
    filter: blur(40px);
  }

  /* ═══════════════════════════════════════════
     LAYER 2: ASCII art overlay — domain warp visualization
     Dense character grid that partially reveals the shader beneath
     ═══════════════════════════════════════════ */
  .ascii-overlay {
    position: absolute;
    inset: 0;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 16px;
    line-height: 18px;
    color: rgba(255, 255, 255, 0.7);
    overflow: hidden;
    white-space: pre;
    mix-blend-mode: overlay;
    z-index: 2;
  }

  /* ═══════════════════════════════════════════
     LAYER 3: Center label
     ═══════════════════════════════════════════ */
  .showcase-label {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 20;
    text-align: center;
  }
  .showcase-title {
    font-family: 'VT323', monospace;
    font-size: 120px;
    color: #fff;
    letter-spacing: 8px;
    text-shadow:
      0 0 30px rgba(255,255,255,0.4),
      0 0 60px rgba(204, 0, 255, 0.3),
      0 0 100px rgba(255, 100, 0, 0.2);
    position: relative;
  }
  /* Chromatic aberration */
  .showcase-title::before {
    content: 'SHADERS';
    position: absolute; top: 0; left: 0;
    color: rgba(255, 50, 50, 0.4);
    transform: translate(-4px, -2px);
  }
  .showcase-title::after {
    content: 'SHADERS';
    position: absolute; top: 0; left: 0;
    color: rgba(50, 100, 255, 0.4);
    transform: translate(4px, 2px);
  }
  .showcase-sub {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 22px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 6px;
    margin-top: 16px;
  }

  /* Corner label — beat indicator */
  .beat-indicator {
    position: absolute;
    top: 40px;
    right: 50px;
    font-family: 'VT323', monospace;
    font-size: 24px;
    color: #FFD080;
    opacity: 0.4;
    letter-spacing: 4px;
    z-index: 20;
  }

  /* CRT overlays */
  .scanlines {
    position: absolute; inset: 0;
    background: repeating-linear-gradient(to bottom, transparent 0px, transparent 2px, rgba(0,0,0,0.10) 2px, rgba(0,0,0,0.10) 4px);
    pointer-events: none; z-index: 90;
  }
  .vignette {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.5) 75%, rgba(0,0,0,0.8) 100%);
    pointer-events: none; z-index: 91;
  }
  .bleed-top, .bleed-bottom {
    position: absolute; left: 0; right: 0; height: 3px; z-index: 92; pointer-events: none;
  }
  .bleed-top { top: 0; background: linear-gradient(90deg, #CC00FF 0%, #FF6600 50%, #00AAFF 100%); opacity: 0.6; }
  .bleed-bottom { bottom: 0; background: linear-gradient(90deg, #00AAFF 0%, #FF6600 50%, #CC00FF 100%); opacity: 0.6; }

  .particles { position: absolute; inset: 0; z-index: 5; pointer-events: none; }
  .particle { position: absolute; width: 2px; height: 2px; border-radius: 50%; }

  /* ═══════════════════════════════════════════
     Bottom strip: other showcase items hinted
     ═══════════════════════════════════════════ */
  .showcase-strip {
    position: absolute;
    bottom: 50px;
    left: 120px;
    right: 120px;
    display: flex;
    gap: 40px;
    z-index: 20;
  }
  .strip-item {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 16px;
    letter-spacing: 3px;
    padding: 8px 0;
    border-bottom: 2px solid transparent;
  }
  .strip-item.active {
    color: #fff;
    border-bottom-color: #FFD080;
  }
  .strip-item.inactive {
    color: rgba(255,255,255,0.25);
  }
</style>
</head>
<body>
  <div class="frame">
    <div class="shader-bg"></div>
    <div class="ascii-overlay" id="asciiOverlay"></div>
    <div class="particles" id="particles"></div>

    <div class="showcase-label">
      <div class="showcase-title">SHADERS</div>
      <div class="showcase-sub">WEBGL · FBM · DOMAIN WARPING</div>
    </div>

    <div class="beat-indicator">01 / 05</div>

    <div class="showcase-strip">
      <div class="strip-item active">SHADERS</div>
      <div class="strip-item inactive">DATA VIZ</div>
      <div class="strip-item inactive">TYPOGRAPHY</div>
      <div class="strip-item inactive">ASCII ART</div>
      <div class="strip-item inactive">PRODUCT</div>
    </div>

    <div class="scanlines"></div>
    <div class="vignette"></div>
    <div class="bleed-top"></div>
    <div class="bleed-bottom"></div>
  </div>

  <script>
    // Generate ASCII art that looks like domain-warped topology
    const density = ' .:-=+*#%@█';
    const cols = 140;
    const rows = 65;
    let art = '';
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        // Simulate FBM-like patterns with overlapping sine waves
        const x = c / cols;
        const y = r / rows;
        const v = Math.sin(x * 12 + y * 8) * Math.cos(y * 15 - x * 6)
                + Math.sin(x * 25 + y * 20) * 0.5
                + Math.sin((x + y) * 18) * 0.3;
        const normalized = (v + 2) / 4; // 0-1
        const idx = Math.floor(normalized * (density.length - 1));
        art += density[Math.max(0, Math.min(density.length - 1, idx))];
      }
      art += '\n';
    }
    document.getElementById('asciiOverlay').textContent = art;

    const colors = ['#CC00FF', '#FF6600', '#00AAFF', '#FFD080', '#33FF33', '#fff'];
    const container = document.getElementById('particles');
    for (let i = 0; i < 80; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + '%';
      p.style.top = Math.random() * 100 + '%';
      p.style.background = colors[Math.floor(Math.random() * colors.length)];
      p.style.opacity = 0.15 + Math.random() * 0.3;
      container.appendChild(p);
    }
  </script>
</body>
</html>
