<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>BG-03C ¬∑ Triadic Field</title>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;padding:0;background:#000;height:100%;overflow:hidden;}
  body{display:grid;place-items:center;}
  .stage{position:relative;width:1920px;height:1080px;background:#06060e;transform-origin:top left;}
  canvas{position:absolute;inset:0;display:block;width:100%;height:100%;}
  .label{position:absolute;left:80px;bottom:80px;z-index:30;
    font-family:'IBM Plex Mono',monospace;font-size:14px;color:rgba(255,255,255,0.5);letter-spacing:0.2em;}
  .label .tag{color:rgba(255,236,200,0.95);
    text-shadow:0 0 16px rgba(255,255,255,0.5),3px 0 0 rgba(0,221,170,0.4),-3px 0 0 rgba(204,0,255,0.4);}
  .scanlines{position:absolute;inset:0;z-index:80;pointer-events:none;
    background:repeating-linear-gradient(to bottom,transparent 0,transparent 2px,rgba(0,0,0,0.13) 2px,rgba(0,0,0,0.13) 4px);}
  .vignette{position:absolute;inset:0;z-index:85;pointer-events:none;
    background:radial-gradient(ellipse at center,transparent 35%,rgba(0,0,0,0.55) 100%);}
  .bleed-bottom{position:absolute;bottom:0;left:0;width:100%;height:4px;z-index:90;
    background:linear-gradient(90deg,rgba(0,221,170,0.6),rgba(255,180,70,0.55),rgba(204,0,255,0.6));}
</style>
</head>
<body>
<div class="stage" id="stage">
  <canvas id="cv" width="1920" height="1080"></canvas>
  <div class="scanlines"></div>
  <div class="vignette"></div>
  <div class="bleed-bottom"></div>
  <div class="label">BG-03C ¬∑ <span class="tag">TRIADIC FIELD</span> ¬∑ vf_domain_warp ¬∑ 3 hue clusters flowing through each other (green / amber / magenta)</div>
</div>
<script>
const stage=document.getElementById('stage');
function fit(){const s=Math.min(innerWidth/1920,innerHeight/1080);stage.style.transform=`scale(${s})`;}
addEventListener('resize',fit);fit();

const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const W=1920,H=1080;
const FS=14;
const CW=Math.round(FS*0.55);
const COLS=Math.floor(W/CW),ROWS=Math.floor(H/FS);

// halffill + braille mix for the rich texture
const PAL=" ¬∑‚àô‚Ä¢‚óî‚óê‚óí‚óï‚óë‚óì‚óñ‚óó‚óô‚ñë‚ñí‚ñì‚ñà".split("");

function hash2(ix,iy){let n=ix*374761393+iy*668265263;n=(n^(n>>>13))*1274126177;return((n^(n>>>16))>>>0)/0xffffffff;}
function smooth(t){return t*t*t*(t*(t*6-15)+10);}
function vn(x,y){
  const ix=Math.floor(x),iy=Math.floor(y);
  const fx=smooth(x-ix),fy=smooth(y-iy);
  const n00=hash2(ix,iy),n10=hash2(ix+1,iy),n01=hash2(ix,iy+1),n11=hash2(ix+1,iy+1);
  return (n00*(1-fx)+n10*fx)*(1-fy)+(n01*(1-fx)+n11*fx)*fy;
}
function fbm4(x,y){let v=0,a=1,fx=1,fy=0.85,m=0;for(let i=0;i<4;i++){v+=vn(x*fx+i*13.7,y*fy+i*27.3)*a;m+=a;a*=0.5;fx*=2;fy*=2;}return v/m;}

// Triadic OKLCH-ish anchors at H 0.45 (green), 0.13 (amber), 0.86 (magenta)
const TRIAD=[
  [0,221,170],   // green
  [255,180,70],  // amber
  [204,0,255]    // magenta
];
function triColor(t01,bri){
  // t01 ‚àà [0,1] picks between 3 anchors with smooth blending
  const seg=t01*3;
  const i0=Math.floor(seg)%3;
  const i1=(i0+1)%3;
  const f=seg-Math.floor(seg);
  // smoothstep blend
  const sf=f*f*(3-2*f);
  const a=TRIAD[i0],b=TRIAD[i1];
  const R=a[0]*(1-sf)+b[0]*sf;
  const G=a[1]*(1-sf)+b[1]*sf;
  const B=a[2]*(1-sf)+b[2]*sf;
  return [R*bri|0,G*bri|0,B*bri|0];
}

let t0=performance.now();
function frame(){
  const t=(performance.now()-t0)/1000;
  ctx.fillStyle='#06060e';ctx.fillRect(0,0,W,H);
  ctx.font=`${FS}px "VT323",monospace`;
  ctx.textBaseline='top';

  const FREQ=0.038,WARP=16,SP=0.18;
  // Use a SECOND warp field as the hue selector ‚Üí 3 hue clusters that flow independently of value field
  const HFREQ=0.022,HSP=0.07;
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      const wx=(vn(c*FREQ*1.3+t*SP,r*FREQ+7.1)-0.5)*WARP;
      const wy=(vn(c*FREQ+t*SP*0.7+3.2,r*FREQ*1.1-11.8)-0.5)*WARP;
      const v=fbm4((c+wx)*FREQ*0.85+t*SP*0.5,(r+wy)*FREQ*0.75-t*SP*0.3);
      if(v<0.16)continue;
      // independent hue field ‚Üí controls which of 3 triadic anchors dominates
      const hueT=fbm4(c*HFREQ+t*HSP,r*HFREQ-t*HSP*0.6);
      const bri=Math.min(1,0.45+v*0.7);
      const [R,G,B]=triColor(hueT,bri);
      const ch=PAL[Math.min(PAL.length-1,Math.floor(v*PAL.length))];
      if(ch===' ')continue;
      const a=Math.min(0.95,0.30+v*0.85);
      ctx.fillStyle=`rgba(${R},${G},${B},${a.toFixed(3)})`;
      ctx.fillText(ch,c*CW,r*FS);
    }
  }

  requestAnimationFrame(frame);
}
frame();
</script>
</body>
</html>
