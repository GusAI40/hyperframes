<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>BG-02 · Binary Break · Violent Fracture</title>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=IBM+Plex+Mono:wght@700&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;padding:0;background:#000;height:100%;overflow:hidden;}
  body{display:grid;place-items:center;}
  .stage{position:relative;width:1920px;height:1080px;background:#000;transform-origin:top left;}
  canvas{position:absolute;inset:0;display:block;width:100%;height:100%;}
  .label{position:absolute;left:80px;bottom:80px;z-index:30;
    font-family:'IBM Plex Mono',monospace;font-size:14px;color:rgba(255,255,255,0.5);letter-spacing:0.2em;}
  .label .tag{color:rgba(255,236,200,0.95);
    text-shadow:0 0 18px rgba(255,255,255,0.6),5px 0 0 rgba(255,0,80,0.4),-5px 0 0 rgba(0,150,255,0.4);}
  .scanlines{position:absolute;inset:0;z-index:80;pointer-events:none;
    background:repeating-linear-gradient(to bottom,transparent 0,transparent 2px,rgba(0,0,0,0.10) 2px,rgba(0,0,0,0.10) 4px);}
  .vignette{position:absolute;inset:0;z-index:85;pointer-events:none;
    background:radial-gradient(ellipse at center,transparent 25%,rgba(0,0,0,0.7) 100%);}
  .bleed-top{position:absolute;top:0;left:0;width:100%;height:5px;z-index:90;
    background:linear-gradient(90deg,rgba(255,0,80,0.6),rgba(255,236,200,0.6),rgba(0,150,255,0.6),rgba(200,0,255,0.5));}
  .bleed-bottom{position:absolute;bottom:0;left:0;width:100%;height:5px;z-index:90;
    background:linear-gradient(90deg,rgba(0,200,200,0.6),rgba(255,0,80,0.6),rgba(255,236,200,0.6),rgba(0,150,255,0.6));}
</style>
</head>
<body>
<div class="stage" id="stage">
  <canvas id="cv" width="1920" height="1080"></canvas>
  <div class="scanlines"></div>
  <div class="vignette"></div>
  <div class="bleed-top"></div>
  <div class="bleed-bottom"></div>
  <div class="label">BG-02 · BINARY BREAK · <span class="tag">VIOLENT FRACTURE</span> · high-velocity warp · RGB-split · slice tears</div>
</div>
<script>
const stage=document.getElementById('stage');
function fit(){const s=Math.min(innerWidth/1920,innerHeight/1080);stage.style.transform=`scale(${s})`;}
addEventListener('resize',fit);fit();

const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const W=1920,H=1080;
const FS=12;
const CW=Math.round(FS*0.55);
const COLS=Math.floor(W/CW),ROWS=Math.floor(H/FS);

const PAL_BIN=" 01".split("");      // mostly 0/1
const PAL_DENSE=" ░▒▓█".split("");
const HEX="0123456789ABCDEF".split("");

function hash2(ix,iy){let n=ix*374761393+iy*668265263;n=(n^(n>>>13))*1274126177;return((n^(n>>>16))>>>0)/0xffffffff;}
function smooth(t){return t*t*t*(t*(t*6-15)+10);}
function vn(x,y){
  const ix=Math.floor(x),iy=Math.floor(y);
  const fx=smooth(x-ix),fy=smooth(y-iy);
  const n00=hash2(ix,iy),n10=hash2(ix+1,iy),n01=hash2(ix,iy+1),n11=hash2(ix+1,iy+1);
  return (n00*(1-fx)+n10*fx)*(1-fy)+(n01*(1-fx)+n11*fx)*fy;
}
function fbm3(x,y){let v=0,a=1,fx=1,fy=0.85,m=0;for(let i=0;i<3;i++){v+=vn(x*fx+i*13.7,y*fy+i*27.3)*a;m+=a;a*=0.5;fx*=2;fy*=2;}return v/m;}

// Pure white-hot center → red/blue chromatic split → polychrome edges
function shockColor(v,radial,t){
  // radial = 0..1 (1 at center)
  const heat=Math.min(1,v*0.6+radial*0.7);
  // chromatic split: R/B channels diverge at strong v
  let R=255*heat;
  let G=255*Math.pow(heat,1.4);
  let B=255*Math.pow(heat,1.1);
  // tint by aberrant rainbow at low radial (edges)
  const edgeTint=1-radial;
  const phase=(v*3+t*0.6+radial*2);
  R+=Math.cos(phase)*60*edgeTint;
  G+=Math.cos(phase+2.094)*60*edgeTint;
  B+=Math.cos(phase+4.188)*60*edgeTint;
  return [Math.max(0,Math.min(255,R))|0,Math.max(0,Math.min(255,G))|0,Math.max(0,Math.min(255,B))|0];
}

let t0=performance.now();
function frame(){
  const t=(performance.now()-t0)/1000;
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
  ctx.font=`${FS}px "VT323",monospace`;
  ctx.textBaseline='top';

  // High-velocity warp + binary palette
  const FREQ=0.05,WARP=22,SP=0.85;
  const cxp=COLS*0.5,cyp=ROWS*0.5;
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      const wx=(vn(c*FREQ*1.4+t*SP,r*FREQ+7.1)-0.5)*WARP;
      const wy=(vn(c*FREQ+t*SP*0.7+3.2,r*FREQ*1.1-11.8)-0.5)*WARP;
      const v=fbm3((c+wx)*FREQ*0.9+t*SP*0.6,(r+wy)*FREQ*0.8-t*SP*0.4);
      // radial proximity for chromatic ramp
      const dx=(c-cxp)/COLS,dy=(r-cyp)/ROWS*1.6;
      const radial=Math.max(0,1-Math.sqrt(dx*dx+dy*dy)*1.4);
      const eff=Math.min(1,v*0.7+radial*0.55);
      if(eff<0.18)continue;
      // pick char: binary at low value, dense blocks at high, hex at peaks
      let ch;
      if(eff>0.78)ch=PAL_DENSE[Math.min(PAL_DENSE.length-1,Math.floor(eff*PAL_DENSE.length))];
      else if(((c*7+r*3)&3)===0)ch=HEX[(c+r*5+(t*40|0))&15];
      else ch=(((c+r+(t*30|0))&1))?'1':'0';
      if(ch===' ')continue;

      const [R,G,B]=shockColor(eff,radial,t);
      const a=Math.min(0.95,0.35+eff*0.85);
      ctx.fillStyle=`rgba(${R},${G},${B},${a.toFixed(3)})`;
      ctx.fillText(ch,c*CW,r*FS);
    }
  }

  // Slice tears — 5-8 horizontal bands displaced laterally
  const N=5+((t*1.5|0)%4);
  for(let i=0;i<N;i++){
    const seed=(i*113+(t*2|0)*97)&0xffff;
    const y=((seed*131)&0xffff)/0xffff*H;
    const h=8+(((seed*17)&0xff)/255)*60;
    const dx=((((seed*7)&0xff)/255)-0.5)*240;
    try{
      const slice=ctx.getImageData(0,y|0,W,h|0);
      ctx.putImageData(slice,dx|0,y|0);
      // RGB fringe on tear
      ctx.globalCompositeOperation='screen';
      ctx.fillStyle='rgba(255,40,80,0.22)';
      ctx.fillRect((dx-8)|0,y|0,W,h|0);
      ctx.fillStyle='rgba(40,180,255,0.22)';
      ctx.fillRect((dx+8)|0,y|0,W,h|0);
      ctx.globalCompositeOperation='source-over';
    }catch(e){}
  }

  // Radial shockwave overlay (additive)
  const burstR=400+Math.sin(t*1.4)*200+t*200;
  const cx=W/2,cy=H/2;
  const grad=ctx.createRadialGradient(cx,cy,0,cx,cy,Math.min(1500,burstR));
  grad.addColorStop(0,'rgba(255,255,240,0.30)');
  grad.addColorStop(0.20,'rgba(255,200,100,0.22)');
  grad.addColorStop(0.50,'rgba(220,80,200,0.10)');
  grad.addColorStop(0.85,'rgba(60,80,220,0.05)');
  grad.addColorStop(1,'rgba(0,0,0,0)');
  ctx.globalCompositeOperation='screen';
  ctx.fillStyle=grad;
  ctx.fillRect(0,0,W,H);
  ctx.globalCompositeOperation='source-over';

  // Occasional full-frame flash (every ~0.7s briefly)
  const flash=Math.max(0,Math.sin(t*9)*0.5+Math.sin(t*4.3)*0.4);
  if(flash>0.85){
    ctx.fillStyle=`rgba(255,255,240,${(flash-0.85)*1.5})`;
    ctx.fillRect(0,0,W,H);
  }

  requestAnimationFrame(frame);
}
frame();
</script>
</body>
</html>
