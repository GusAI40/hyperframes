<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>BG-03B · Shader Render · Domain Warp</title>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;padding:0;background:#000;height:100%;overflow:hidden;}
  body{display:grid;place-items:center;}
  .stage{position:relative;width:1920px;height:1080px;background:#000;transform-origin:top left;}
  canvas{position:absolute;inset:0;display:block;width:100%;height:100%;}
  .label{position:absolute;left:80px;bottom:80px;z-index:30;
    font-family:'IBM Plex Mono',monospace;font-size:14px;color:rgba(255,200,140,0.45);letter-spacing:0.2em;}
  .label .tag{color:rgba(255,200,140,0.85);
    text-shadow:0 0 14px rgba(255,180,70,0.5),3px 0 0 rgba(255,0,80,0.2),-3px 0 0 rgba(0,150,255,0.2);}
  .scanlines{position:absolute;inset:0;z-index:80;pointer-events:none;
    background:repeating-linear-gradient(to bottom,transparent 0,transparent 2px,rgba(0,0,0,0.13) 2px,rgba(0,0,0,0.13) 4px);}
  .vignette{position:absolute;inset:0;z-index:85;pointer-events:none;
    background:radial-gradient(ellipse at center,transparent 30%,rgba(0,0,0,0.65) 100%);}
  .bleed-bottom{position:absolute;bottom:0;left:0;width:100%;height:5px;z-index:90;
    background:linear-gradient(90deg,rgba(0,221,170,0.5),rgba(204,0,255,0.4),rgba(255,180,70,0.55),rgba(68,136,255,0.4));}
</style>
</head>
<body>
<div class="stage" id="stage">
  <canvas id="cv" width="1920" height="1080"></canvas>
  <div class="scanlines"></div>
  <div class="vignette"></div>
  <div class="bleed-bottom"></div>
  <div class="label">BG-03B · SHADER RENDER · <span class="tag">DOMAIN WARP</span> · vf_domain_warp(fbm) · OKLAB teal→amber lerp</div>
</div>
<script>
const stage=document.getElementById('stage');
function fit(){const s=Math.min(innerWidth/1920,innerHeight/1080);stage.style.transform=`scale(${s})`;}
addEventListener('resize',fit);fit();

const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const W=1920,H=1080;
const FS=14;
const CW=Math.round(FS*0.55);
const COLS=Math.floor(W/CW),ROWS=Math.floor(H/FS);

// PAL_HALFFILL + PAL_DENSE — quarter/half progressive fills then block ramp
const PAL=[' ','·','∘','◔','◐','◒','◕','◑','◓','◖','◗','◙','░','▒','▓','█'];
const HEX="0123456789ABCDEF".split("");

// noise
function hash2(ix,iy){let n=ix*374761393+iy*668265263;n=(n^(n>>>13))*1274126177;return((n^(n>>>16))>>>0)/0xffffffff;}
function smooth(t){return t*t*t*(t*(t*6-15)+10);}
function vn(x,y){
  const ix=Math.floor(x),iy=Math.floor(y);
  const fx=smooth(x-ix),fy=smooth(y-iy);
  const n00=hash2(ix,iy),n10=hash2(ix+1,iy),n01=hash2(ix,iy+1),n11=hash2(ix+1,iy+1);
  return (n00*(1-fx)+n10*fx)*(1-fy)+(n01*(1-fx)+n11*fx)*fy;
}
function fbm4(x,y){
  let v=0,a=1,fx=1,fy=0.85,mx=0;
  for(let i=0;i<4;i++){v+=vn(x*fx+i*13.7,y*fy+i*27.3)*a;mx+=a;a*=0.5;fx*=2;fy*=2;}
  return v/mx;
}

// linear-RGB lerp — cheap stand-in for OKLAB lerp; fine visually for warm/cool
const C_COOL=[0,42,68];      // deep teal #002A44
const C_MID =[182,84,108];   // muted plum bridge (avoids muddy mid)
const C_WARM=[255,178,96];   // amber #FFB260
const C_HOT =[255,236,200];  // bone highlight
function ramp(v){
  // 3-stop perceptual-ish ramp
  let r,g,b;
  if(v<0.5){const t=v/0.5;r=C_COOL[0]+(C_MID[0]-C_COOL[0])*t;g=C_COOL[1]+(C_MID[1]-C_COOL[1])*t;b=C_COOL[2]+(C_MID[2]-C_COOL[2])*t;}
  else if(v<0.85){const t=(v-0.5)/0.35;r=C_MID[0]+(C_WARM[0]-C_MID[0])*t;g=C_MID[1]+(C_WARM[1]-C_MID[1])*t;b=C_MID[2]+(C_WARM[2]-C_MID[2])*t;}
  else{const t=(v-0.85)/0.15;r=C_WARM[0]+(C_HOT[0]-C_WARM[0])*t;g=C_WARM[1]+(C_HOT[1]-C_WARM[1])*t;b=C_WARM[2]+(C_HOT[2]-C_WARM[2])*t;}
  return[r|0,g|0,b|0];
}

// micro-data drifting hex strings
const N_DATA=10;
const dataStrips=[];
const rng=(s=>()=>{s=(s*1664525+1013904223)>>>0;return s/0xffffffff;})(11);
for(let i=0;i<N_DATA;i++){
  let s='';for(let k=0;k<28;k++)s+=HEX[Math.floor(rng()*16)];
  dataStrips.push({x:rng()*COLS,y:Math.floor(rng()*ROWS),sp:0.05+rng()*0.12,txt:s});
}

let t0=performance.now();
function frame(){
  const t=(performance.now()-t0)/1000;
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
  ctx.font=`${FS}px "VT323",monospace`;
  ctx.textBaseline='top';

  // domain warp at every cell
  const FREQ=0.045,WARP=14,SP=0.18;
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      // warp displacement
      const wx=(vn(c*FREQ*1.3+t*SP,r*FREQ+7.1)-0.5)*WARP;
      const wy=(vn(c*FREQ+t*SP*0.7+3.2,r*FREQ*1.1-11.8)-0.5)*WARP;
      // base fbm at warped coords
      const v=fbm4((c+wx)*FREQ*0.85+t*SP*0.5,(r+wy)*FREQ*0.75-t*SP*0.3);
      if(v<0.18)continue;
      const ch=PAL[Math.min(PAL.length-1,Math.floor(v*PAL.length))];
      if(ch===' ')continue;
      const [R,G,B]=ramp(v);
      const a=Math.min(0.95,0.25+v*0.85);
      ctx.fillStyle=`rgba(${R},${G},${B},${a.toFixed(3)})`;
      ctx.fillText(ch,c*CW,r*FS);
    }
  }

  // micro-data hex strips (diagnostic overlay)
  ctx.fillStyle='rgba(255,200,120,0.22)';
  for(const d of dataStrips){
    d.x+=d.sp;if(d.x>COLS+8)d.x=-d.txt.length;
    for(let i=0;i<d.txt.length;i++){
      const c=Math.floor(d.x+i);
      if(c>=0&&c<COLS)ctx.fillText(d.txt[i],c*CW,d.y*FS);
    }
  }

  requestAnimationFrame(frame);
}
frame();
</script>
</body>
</html>
