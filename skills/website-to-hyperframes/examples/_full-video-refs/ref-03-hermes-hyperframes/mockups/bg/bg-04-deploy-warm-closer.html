<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>BG-04 · Deploy · Warm Horizon</title>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;padding:0;background:#000;height:100%;overflow:hidden;}
  body{display:grid;place-items:center;}
  .stage{position:relative;width:1920px;height:1080px;background:#000;transform-origin:top left;}
  canvas{position:absolute;inset:0;display:block;width:100%;height:100%;}
  .cool-wedge{position:absolute;top:0;left:0;width:100%;height:38%;z-index:5;pointer-events:none;
    background:linear-gradient(180deg,rgba(74,136,255,0.16),rgba(74,136,255,0));mix-blend-mode:screen;}
  .label{position:absolute;left:80px;bottom:80px;z-index:30;
    font-family:'IBM Plex Mono',monospace;font-size:14px;color:rgba(255,200,140,0.5);letter-spacing:0.2em;}
  .label .tag{color:rgba(255,208,128,0.95);
    text-shadow:0 0 16px rgba(255,180,70,0.6),3px 0 0 rgba(255,0,80,0.18),-3px 0 0 rgba(74,136,255,0.3);}
  .scanlines{position:absolute;inset:0;z-index:80;pointer-events:none;
    background:repeating-linear-gradient(to bottom,transparent 0,transparent 1.5px,rgba(0,0,0,0.16) 1.5px,rgba(0,0,0,0.16) 3px);}
  .vignette{position:absolute;inset:0;z-index:85;pointer-events:none;
    background:radial-gradient(ellipse at center 45%,transparent 30%,rgba(0,0,0,0.65) 100%);}
  .bleed-top{position:absolute;top:0;left:0;width:100%;height:3px;z-index:90;
    background:linear-gradient(90deg,rgba(74,136,255,0.5),rgba(255,180,70,0.4),rgba(0,200,200,0.5));}
  .bleed-bottom{position:absolute;bottom:0;left:0;width:100%;height:5px;z-index:90;
    background:linear-gradient(90deg,rgba(255,180,70,0.6),rgba(204,0,255,0.4),rgba(74,136,255,0.5),rgba(255,180,70,0.5));}
</style>
</head>
<body>
<div class="stage" id="stage">
  <canvas id="cv" width="1920" height="1080"></canvas>
  <div class="cool-wedge"></div>
  <div class="scanlines"></div>
  <div class="vignette"></div>
  <div class="bleed-top"></div>
  <div class="bleed-bottom"></div>
  <div class="label">BG-04 · DEPLOY · <span class="tag">WARM HORIZON</span> · slow vf_domain_warp · earth ramp · cool-blue wedge · golden sparks</div>
</div>
<script>
const stage=document.getElementById('stage');
function fit(){const s=Math.min(innerWidth/1920,innerHeight/1080);stage.style.transform=`scale(${s})`;}
addEventListener('resize',fit);fit();

const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const W=1920,H=1080;
const FS=14;
const CW=Math.round(FS*0.55);
const COLS=Math.floor(W/CW),ROWS=Math.floor(H/FS);

const PAL=" ·∘•░▒▓█".split("");
const SPARK=['·','✦','✧','★'];

function hash2(ix,iy){let n=ix*374761393+iy*668265263;n=(n^(n>>>13))*1274126177;return((n^(n>>>16))>>>0)/0xffffffff;}
function smooth(t){return t*t*t*(t*(t*6-15)+10);}
function vn(x,y){
  const ix=Math.floor(x),iy=Math.floor(y);
  const fx=smooth(x-ix),fy=smooth(y-iy);
  const n00=hash2(ix,iy),n10=hash2(ix+1,iy),n01=hash2(ix,iy+1),n11=hash2(ix+1,iy+1);
  return (n00*(1-fx)+n10*fx)*(1-fy)+(n01*(1-fx)+n11*fx)*fy;
}
function fbm5(x,y){let v=0,a=1,fx=1,fy=0.85,m=0;for(let i=0;i<5;i++){v+=vn(x*fx+i*9.3,y*fy+i*17.7)*a;m+=a;a*=0.5;fx*=2;fy*=2;}return v/m;}

// Earth ramp — deep umber → rust → amber → gold → bone, biased warmer near center
const C_DEEP=[26,12,4];
const C_RUST=[110,52,18];
const C_AMBER=[230,140,55];
const C_GOLD=[255,200,128];
const C_HOT=[255,236,200];
function earthRamp(v){
  let r,g,b;
  if(v<0.30){const t=v/0.30;r=C_DEEP[0]+(C_RUST[0]-C_DEEP[0])*t;g=C_DEEP[1]+(C_RUST[1]-C_DEEP[1])*t;b=C_DEEP[2]+(C_RUST[2]-C_DEEP[2])*t;}
  else if(v<0.65){const t=(v-0.30)/0.35;r=C_RUST[0]+(C_AMBER[0]-C_RUST[0])*t;g=C_RUST[1]+(C_AMBER[1]-C_RUST[1])*t;b=C_RUST[2]+(C_AMBER[2]-C_RUST[2])*t;}
  else if(v<0.88){const t=(v-0.65)/0.23;r=C_AMBER[0]+(C_GOLD[0]-C_AMBER[0])*t;g=C_AMBER[1]+(C_GOLD[1]-C_AMBER[1])*t;b=C_AMBER[2]+(C_GOLD[2]-C_AMBER[2])*t;}
  else{const t=(v-0.88)/0.12;r=C_GOLD[0]+(C_HOT[0]-C_GOLD[0])*t;g=C_GOLD[1]+(C_HOT[1]-C_GOLD[1])*t;b=C_GOLD[2]+(C_HOT[2]-C_GOLD[2])*t;}
  return[r|0,g|0,b|0];
}

// Golden sparks drifting upward
const N_SPARKS=70;
const sparks=[];
const rng=(s=>()=>{s=(s*1664525+1013904223)>>>0;return s/0xffffffff;})(31);
for(let i=0;i<N_SPARKS;i++){
  sparks.push({x:rng()*W,y:rng()*H,vy:-(0.15+rng()*0.45),vx:(rng()-0.5)*0.1,life:rng(),sz:0.5+rng()*0.8});
}

let t0=performance.now();
function frame(){
  const t=(performance.now()-t0)/1000;
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
  ctx.font=`${FS}px "VT323",monospace`;
  ctx.textBaseline='top';

  // Slow domain-warped fbm — big slow shapes for the "rest" feel
  const FREQ=0.024,WARP=18,SP=0.07;
  const cxp=COLS*0.5,cyp=ROWS*0.5;
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      const wx=(vn(c*FREQ*1.3+t*SP,r*FREQ+7.1)-0.5)*WARP;
      const wy=(vn(c*FREQ+t*SP*0.7+3.2,r*FREQ*1.1-11.8)-0.5)*WARP;
      let v=fbm5((c+wx)*FREQ*0.85+t*SP*0.5,(r+wy)*FREQ*0.75-t*SP*0.3);
      // radial bias — hotter near horizon line
      const dx=(c-cxp)/COLS,dy=(r-cyp)/ROWS*1.4;
      const rad=Math.max(0,1-Math.sqrt(dx*dx+dy*dy)*1.3);
      v=Math.min(1,v*0.75+rad*0.45);
      if(v<0.18)continue;
      const ch=PAL[Math.min(PAL.length-1,Math.floor(v*PAL.length))];
      if(ch===' ')continue;
      const [R,G,B]=earthRamp(v);
      const a=Math.min(0.95,0.32+v*0.85);
      ctx.fillStyle=`rgba(${R},${G},${B},${a.toFixed(3)})`;
      ctx.fillText(ch,c*CW,r*FS);
    }
  }

  // Cool-blue wedge data hint — sparse blue dots in upper third (Nous accent)
  ctx.fillStyle='rgba(120,170,255,0.42)';
  for(let i=0;i<14;i++){
    const sx=(i*1009+(t*40|0)*131)%W;
    const sy=((i*47)%(H*0.35))|0;
    ctx.fillText('·',sx,sy);
  }

  // Golden sparks drifting up
  for(const s of sparks){
    s.x+=s.vx;s.y+=s.vy;s.life+=0.005;
    if(s.y<-10){s.y=H+10;s.x=rng()*W;s.life=rng();}
    const flick=0.6+Math.sin(s.life*8+t*4)*0.35;
    const ch=SPARK[Math.floor(s.life*4)%SPARK.length];
    ctx.fillStyle=`rgba(255,220,140,${(0.5*flick).toFixed(3)})`;
    ctx.fillText(ch,s.x|0,s.y|0);
  }

  requestAnimationFrame(frame);
}
frame();
</script>
</body>
</html>
