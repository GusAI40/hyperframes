<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>BG-03A · GSAP Grid · Polychromatic Aurora</title>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;padding:0;background:#000;height:100%;overflow:hidden;}
  body{display:grid;place-items:center;}
  .stage{position:relative;width:1920px;height:1080px;background:#06061a;transform-origin:top left;}
  canvas{position:absolute;inset:0;display:block;width:100%;height:100%;}
  .label{position:absolute;left:80px;bottom:80px;z-index:30;
    font-family:'IBM Plex Mono',monospace;font-size:14px;color:rgba(255,255,255,0.55);letter-spacing:0.2em;}
  .label .tag{color:rgba(255,236,200,0.95);
    text-shadow:0 0 16px rgba(255,255,255,0.5),3px 0 0 rgba(255,0,80,0.25),-3px 0 0 rgba(0,150,255,0.25);}
  .scanlines{position:absolute;inset:0;z-index:80;pointer-events:none;
    background:repeating-linear-gradient(to bottom,transparent 0,transparent 2px,rgba(0,0,0,0.13) 2px,rgba(0,0,0,0.13) 4px);}
  .vignette{position:absolute;inset:0;z-index:85;pointer-events:none;
    background:radial-gradient(ellipse at center,transparent 35%,rgba(0,0,0,0.55) 100%);}
  .bleed-bottom{position:absolute;bottom:0;left:0;width:100%;height:4px;z-index:90;
    background:linear-gradient(90deg,rgba(255,180,70,0.55),rgba(0,200,200,0.45),rgba(204,0,255,0.55),rgba(0,255,150,0.45));}
</style>
</head>
<body>
<div class="stage" id="stage">
  <canvas id="cv" width="1920" height="1080"></canvas>
  <div class="scanlines"></div>
  <div class="vignette"></div>
  <div class="bleed-bottom"></div>
  <div class="label">BG-03A · GSAP GRID · <span class="tag">POLYCHROMATIC AURORA</span> · vf_domain_warp · OKLCH-uniform rainbow blobs</div>
</div>
<script>
const stage=document.getElementById('stage');
function fit(){const s=Math.min(innerWidth/1920,innerHeight/1080);stage.style.transform=`scale(${s})`;}
addEventListener('resize',fit);fit();

const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const W=1920,H=1080;
const FS=14;
const CW=Math.round(FS*0.55);
const COLS=Math.floor(W/CW),ROWS=Math.floor(H/FS);

// Block elements + quadrant blocks for the "wall of pixels" feel
const PAL=" ░▒▓█▙▟▛▜".split("");

function hash2(ix,iy){let n=ix*374761393+iy*668265263;n=(n^(n>>>13))*1274126177;return((n^(n>>>16))>>>0)/0xffffffff;}
function smooth(t){return t*t*t*(t*(t*6-15)+10);}
function vn(x,y){
  const ix=Math.floor(x),iy=Math.floor(y);
  const fx=smooth(x-ix),fy=smooth(y-iy);
  const n00=hash2(ix,iy),n10=hash2(ix+1,iy),n01=hash2(ix,iy+1),n11=hash2(ix+1,iy+1);
  return (n00*(1-fx)+n10*fx)*(1-fy)+(n01*(1-fx)+n11*fx)*fy;
}
function fbm4(x,y){let v=0,a=1,fx=1,fy=0.85,m=0;for(let i=0;i<4;i++){v+=vn(x*fx+i*13.7,y*fy+i*27.3)*a;m+=a;a*=0.5;fx*=2;fy*=2;}return v/m;}

// HSL→RGB at L=0.6 S=0.62 — perceptually evenish for a mockup; OKLCH-ish
function hslColor(h,bri){
  const s=0.62,l=0.55*bri+0.18;
  const c=(1-Math.abs(2*l-1))*s;
  const hp=((h%1)+1)%1*6,x=c*(1-Math.abs(hp%2-1)),m=l-c/2;
  let r,g,b;
  if(hp<1){r=c;g=x;b=0;}else if(hp<2){r=x;g=c;b=0;}
  else if(hp<3){r=0;g=c;b=x;}else if(hp<4){r=0;g=x;b=c;}
  else if(hp<5){r=x;g=0;b=c;}else{r=c;g=0;b=x;}
  return[((r+m)*255)|0,((g+m)*255)|0,((b+m)*255)|0];
}

let t0=performance.now();
function frame(){
  const t=(performance.now()-t0)/1000;
  ctx.fillStyle='#06061a';ctx.fillRect(0,0,W,H);
  ctx.font=`${FS}px "VT323",monospace`;
  ctx.textBaseline='top';

  const FREQ=0.040,WARP=14,SP=0.22;
  const cxp=COLS*0.5,cyp=ROWS*0.5;
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      const wx=(vn(c*FREQ*1.3+t*SP,r*FREQ+7.1)-0.5)*WARP;
      const wy=(vn(c*FREQ+t*SP*0.7+3.2,r*FREQ*1.1-11.8)-0.5)*WARP;
      const v=fbm4((c+wx)*FREQ*0.85+t*SP*0.5,(r+wy)*FREQ*0.75-t*SP*0.3);
      if(v<0.16)continue;
      const ch=PAL[Math.min(PAL.length-1,Math.floor(v*PAL.length))];
      if(ch===' ')continue;
      // hue from warp + angle → polychromatic OKLCH-style rainbow
      const ang=Math.atan2(r-cyp,(c-cxp))/(Math.PI*2);
      const hue=(ang+v*0.4+t*0.04)%1;
      const [R,G,B]=hslColor(hue,Math.min(1,v*1.1));
      const a=Math.min(0.95,0.30+v*0.85);
      ctx.fillStyle=`rgba(${R},${G},${B},${a.toFixed(3)})`;
      ctx.fillText(ch,c*CW,r*FS);
    }
  }

  requestAnimationFrame(frame);
}
frame();
</script>
</body>
</html>
