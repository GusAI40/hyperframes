<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>BG-01 · Boot · Neural Activity</title>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;padding:0;background:#000;height:100%;overflow:hidden;}
  body{display:grid;place-items:center;}
  .stage{position:relative;width:1920px;height:1080px;background:#000;transform-origin:top left;}
  canvas{position:absolute;inset:0;display:block;width:100%;height:100%;}
  .label{position:absolute;left:80px;bottom:80px;z-index:30;
    font-family:'IBM Plex Mono',monospace;font-size:14px;color:rgba(255,200,140,0.5);letter-spacing:0.2em;}
  .label .tag{color:rgba(255,208,128,0.9);
    text-shadow:0 0 14px rgba(255,180,70,0.6),3px 0 0 rgba(255,0,80,0.2),-3px 0 0 rgba(0,150,255,0.2);}
  .scanlines{position:absolute;inset:0;z-index:80;pointer-events:none;
    background:repeating-linear-gradient(to bottom,transparent 0,transparent 2px,rgba(0,0,0,0.16) 2px,rgba(0,0,0,0.16) 4px);}
  .vignette{position:absolute;inset:0;z-index:85;pointer-events:none;
    background:radial-gradient(ellipse at center,transparent 30%,rgba(0,0,0,0.65) 100%);}
  .bleed-top{position:absolute;top:0;left:0;width:100%;height:3px;z-index:90;
    background:linear-gradient(90deg,rgba(0,120,255,0.4),rgba(255,180,70,0.45),rgba(51,255,119,0.4));}
  .bleed-bottom{position:absolute;bottom:0;left:0;width:100%;height:5px;z-index:90;
    background:linear-gradient(90deg,rgba(255,180,70,0.6),rgba(255,100,40,0.4),rgba(255,180,70,0.5),rgba(0,120,255,0.3));}
</style>
</head>
<body>
<div class="stage" id="stage">
  <canvas id="cv" width="1920" height="1080"></canvas>
  <div class="scanlines"></div>
  <div class="vignette"></div>
  <div class="bleed-top"></div>
  <div class="bleed-bottom"></div>
  <div class="label">BG-01 · BOOT · <span class="tag">NEURAL ACTIVITY</span> · vf_domain_warp(fbm) · mono-amber + phosphor scan-pulses</div>
</div>
<script>
const stage=document.getElementById('stage');
function fit(){const s=Math.min(innerWidth/1920,innerHeight/1080);stage.style.transform=`scale(${s})`;}
addEventListener('resize',fit);fit();

const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const W=1920,H=1080;
const FS=14;
const CW=Math.round(FS*0.55);
const COLS=Math.floor(W/CW),ROWS=Math.floor(H/FS);

// Mostly hex + binary — reads as "memory addresses" / "registers"
const PAL=" ·∘•░▒▓█".split("");
const HEX="0123456789ABCDEF".split("");

function hash2(ix,iy){let n=ix*374761393+iy*668265263;n=(n^(n>>>13))*1274126177;return((n^(n>>>16))>>>0)/0xffffffff;}
function smooth(t){return t*t*t*(t*(t*6-15)+10);}
function vn(x,y){
  const ix=Math.floor(x),iy=Math.floor(y);
  const fx=smooth(x-ix),fy=smooth(y-iy);
  const n00=hash2(ix,iy),n10=hash2(ix+1,iy),n01=hash2(ix,iy+1),n11=hash2(ix+1,iy+1);
  return (n00*(1-fx)+n10*fx)*(1-fy)+(n01*(1-fx)+n11*fx)*fy;
}
function fbm4(x,y){let v=0,a=1,fx=1,fy=0.85,m=0;for(let i=0;i<4;i++){v+=vn(x*fx+i*13.7,y*fy+i*27.3)*a;m+=a;a*=0.5;fx*=2;fy*=2;}return v/m;}

// mono-amber ramp: dim brown → amber → bone
const C_DARK=[24,14,4];
const C_RUST=[120,68,20];
const C_AMBER=[255,180,70];
const C_HOT=[255,236,200];
function ramp(v){
  let r,g,b;
  if(v<0.40){const t=v/0.40;r=C_DARK[0]+(C_RUST[0]-C_DARK[0])*t;g=C_DARK[1]+(C_RUST[1]-C_DARK[1])*t;b=C_DARK[2]+(C_RUST[2]-C_DARK[2])*t;}
  else if(v<0.85){const t=(v-0.40)/0.45;r=C_RUST[0]+(C_AMBER[0]-C_RUST[0])*t;g=C_RUST[1]+(C_AMBER[1]-C_RUST[1])*t;b=C_RUST[2]+(C_AMBER[2]-C_RUST[2])*t;}
  else{const t=(v-0.85)/0.15;r=C_AMBER[0]+(C_HOT[0]-C_AMBER[0])*t;g=C_AMBER[1]+(C_HOT[1]-C_AMBER[1])*t;b=C_AMBER[2]+(C_HOT[2]-C_AMBER[2])*t;}
  return[r|0,g|0,b|0];
}

let t0=performance.now();
function frame(){
  const t=(performance.now()-t0)/1000;
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
  ctx.font=`${FS}px "VT323",monospace`;
  ctx.textBaseline='top';

  // Domain-warped fbm — full screen dense
  const FREQ=0.038,WARP=10,SP=0.16;
  for(let r=0;r<ROWS;r++){
    // 3 phosphor-green scan pulses rolling down at different rates
    const p1=((t*0.35)%1.4)-0.2; // normalized 0..1 trip down
    const p2=((t*0.21+0.55)%1.6)-0.3;
    const p3=((t*0.13+0.30)%1.9)-0.4;
    const rN=r/ROWS;
    const inP1=Math.max(0,1-Math.abs(rN-p1)*40);
    const inP2=Math.max(0,1-Math.abs(rN-p2)*55);
    const inP3=Math.max(0,1-Math.abs(rN-p3)*30);
    const pulse=Math.max(inP1,inP2*0.7,inP3*0.5);

    for(let c=0;c<COLS;c++){
      const wx=(vn(c*FREQ*1.2+t*SP,r*FREQ+7.1)-0.5)*WARP;
      const wy=(vn(c*FREQ+t*SP*0.7+3.2,r*FREQ*1.1-11.8)-0.5)*WARP;
      const v=fbm4((c+wx)*FREQ*0.85+t*SP*0.4,(r+wy)*FREQ*0.75-t*SP*0.3);
      if(v<0.10)continue;
      // chars: dense block ramp at value, but every few cells render a hex digit instead for "data" feel
      let ch;
      if(((c*3+r*7+(t*4|0))%9)===0&&v>0.32){
        ch=HEX[(c+r*5+(t*8|0))&15];
      }else{
        ch=PAL[Math.min(PAL.length-1,Math.floor(v*PAL.length))];
      }
      if(ch===' ')continue;

      let R,G,B;
      if(pulse>0.05){
        // phosphor-green pulse boost: shift hue toward #33FF77 and brighten
        const [r0,g0,b0]=ramp(Math.min(1,v+0.1));
        R=r0*(1-pulse*0.65)+51*pulse*1.2;
        G=g0*(1-pulse*0.2)+255*pulse;
        B=b0*(1-pulse*0.85)+119*pulse*0.8;
      }else{
        [R,G,B]=ramp(v);
      }
      const a=Math.min(0.96,0.30+v*0.85+pulse*0.4);
      ctx.fillStyle=`rgba(${R|0},${G|0},${B|0},${a.toFixed(3)})`;
      ctx.fillText(ch,c*CW,r*FS);
    }
  }

  requestAnimationFrame(frame);
}
frame();
</script>
</body>
</html>
