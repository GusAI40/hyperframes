<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>KF03-A — GSAP Capabilities Grid</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=VT323&family=IBM+Plex+Mono:wght@400;600&display=swap');
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1920px;
    height: 1080px;
    background: #08080c;
    overflow: hidden;
    position: relative;
  }

  /* Warm dark gradient base with color pools */
  .bg {
    position: absolute; inset: 0; z-index: 0;
    background:
      radial-gradient(900px 600px at 15% 25%, rgba(255, 120, 40, 0.06) 0%, transparent 100%),
      radial-gradient(800px 500px at 85% 75%, rgba(0, 180, 200, 0.05) 0%, transparent 100%),
      radial-gradient(600px 600px at 50% 50%, rgba(180, 0, 255, 0.04) 0%, transparent 100%),
      radial-gradient(1200px 800px at 40% 60%, rgba(10, 15, 20, 1) 0%, #08080c 100%);
  }

  /* The grid — 6 columns x 4 rows of animated cells */
  .grid {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 10;
    display: grid;
    grid-template-columns: repeat(6, 200px);
    grid-template-rows: repeat(4, 160px);
    gap: 20px;
  }

  .cell {
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid rgba(255, 255, 255, 0.04);
    border-radius: 6px;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .cell::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 6px;
    pointer-events: none;
  }

  /* Cell 1: Rotating square */
  .c-rotate {
    .shape {
      width: 60px; height: 60px;
      border: 2px solid #FF6B4A;
      border-radius: 4px;
      animation: spinSlow 4s linear infinite;
      box-shadow: 0 0 20px rgba(255, 107, 74, 0.3);
    }
  }
  @keyframes spinSlow { to { transform: rotate(360deg); } }

  /* Cell 2: Pulsing circle with ring */
  .c-pulse .ring {
    width: 80px; height: 80px;
    border: 2px solid rgba(0, 220, 180, 0.6);
    border-radius: 50%;
    position: absolute;
    animation: pulseRing 2s ease-out infinite;
  }
  .c-pulse .dot {
    width: 24px; height: 24px;
    background: #00DDAA;
    border-radius: 50%;
    box-shadow: 0 0 20px rgba(0, 221, 170, 0.5);
    animation: pulseDot 2s ease-in-out infinite;
  }
  @keyframes pulseRing { 0% { transform: scale(0.6); opacity: 1; } 100% { transform: scale(1.8); opacity: 0; } }
  @keyframes pulseDot { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.3); } }

  /* Cell 3: Staggered bars (visualizer) */
  .c-bars { gap: 4px; }
  .c-bars .bar {
    width: 10px;
    background: linear-gradient(to top, #CC00FF, #FF6B9D);
    border-radius: 2px;
    animation: barBounce 1.2s ease-in-out infinite;
    box-shadow: 0 0 8px rgba(204, 0, 255, 0.3);
  }
  .c-bars .bar:nth-child(1) { height: 80px; animation-delay: 0s; }
  .c-bars .bar:nth-child(2) { height: 50px; animation-delay: 0.1s; }
  .c-bars .bar:nth-child(3) { height: 110px; animation-delay: 0.2s; }
  .c-bars .bar:nth-child(4) { height: 40px; animation-delay: 0.05s; }
  .c-bars .bar:nth-child(5) { height: 90px; animation-delay: 0.15s; }
  .c-bars .bar:nth-child(6) { height: 60px; animation-delay: 0.25s; }
  .c-bars .bar:nth-child(7) { height: 100px; animation-delay: 0.08s; }
  .c-bars .bar:nth-child(8) { height: 45px; animation-delay: 0.18s; }
  @keyframes barBounce { 0%, 100% { transform: scaleY(0.4); } 50% { transform: scaleY(1); } }

  /* Cell 4: Orbiting dots */
  .c-orbit { perspective: 400px; }
  .c-orbit .orbit-ring {
    width: 100px; height: 100px;
    position: absolute;
    border: 1px solid rgba(68, 136, 255, 0.2);
    border-radius: 50%;
    animation: orbitSpin 3s linear infinite;
    transform-style: preserve-3d;
  }
  .c-orbit .orbit-ring:nth-child(2) { width: 70px; height: 70px; animation-duration: 2s; animation-direction: reverse; border-color: rgba(255, 180, 70, 0.2); }
  .c-orbit .orbit-ring:nth-child(3) { width: 130px; height: 130px; animation-duration: 5s; border-color: rgba(0, 221, 170, 0.15); }
  .c-orbit .orb-dot {
    width: 8px; height: 8px;
    background: #4488FF;
    border-radius: 50%;
    position: absolute; top: -4px; left: 50%; margin-left: -4px;
    box-shadow: 0 0 12px rgba(68, 136, 255, 0.6);
  }
  .c-orbit .orbit-ring:nth-child(2) .orb-dot { background: #FFB446; box-shadow: 0 0 12px rgba(255, 180, 70, 0.6); }
  .c-orbit .orbit-ring:nth-child(3) .orb-dot { background: #00DDAA; box-shadow: 0 0 12px rgba(0, 221, 170, 0.6); }
  @keyframes orbitSpin { to { transform: rotateZ(360deg) rotateX(60deg); } }

  /* Cell 5: Elastic bounce */
  .c-elastic .bounce-box {
    width: 50px; height: 50px;
    background: linear-gradient(135deg, #FFB446, #FF6B4A);
    border-radius: 8px;
    animation: elasticBounce 2s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
    box-shadow: 0 0 24px rgba(255, 180, 70, 0.4);
  }
  @keyframes elasticBounce { 0%, 100% { transform: translateY(40px) scaleY(0.8) scaleX(1.1); } 50% { transform: translateY(-40px) scaleY(1.1) scaleX(0.9); } }

  /* Cell 6: Gradient sweep text */
  .c-gradient .grad-text {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 32px;
    font-weight: 600;
    background: linear-gradient(90deg, #FF6B4A, #FFB446, #00DDAA, #4488FF, #CC00FF, #FF6B4A);
    background-size: 300% 100%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: gradSweep 3s linear infinite;
  }
  @keyframes gradSweep { to { background-position: -300% 0; } }

  /* Cell 7: Motion path trace */
  .c-path svg { width: 180px; height: 130px; overflow: visible; }
  .c-path .trace { stroke: rgba(0, 220, 170, 0.2); fill: none; stroke-width: 1.5; }
  .c-path .tracer { fill: #00DDAA; filter: drop-shadow(0 0 6px rgba(0, 221, 170, 0.6)); }
  .c-path .trail { stroke: #00DDAA; fill: none; stroke-width: 2; stroke-dasharray: 80 200; animation: dashMove 2s linear infinite; }
  @keyframes dashMove { to { stroke-dashoffset: -280; } }

  /* Cell 8: Scale stagger grid */
  .c-stagger {
    display: grid;
    grid-template-columns: repeat(5, 16px);
    grid-template-rows: repeat(5, 16px);
    gap: 6px;
  }
  .c-stagger .sq {
    background: #CC00FF;
    border-radius: 2px;
    animation: staggerPop 2.5s ease-in-out infinite;
    box-shadow: 0 0 6px rgba(204, 0, 255, 0.3);
  }
  .c-stagger .sq:nth-child(1) { animation-delay: 0s; }
  .c-stagger .sq:nth-child(2) { animation-delay: 0.08s; }
  .c-stagger .sq:nth-child(3) { animation-delay: 0.16s; }
  .c-stagger .sq:nth-child(4) { animation-delay: 0.24s; }
  .c-stagger .sq:nth-child(5) { animation-delay: 0.32s; }
  .c-stagger .sq:nth-child(6) { animation-delay: 0.08s; }
  .c-stagger .sq:nth-child(7) { animation-delay: 0.16s; }
  .c-stagger .sq:nth-child(8) { animation-delay: 0.24s; }
  .c-stagger .sq:nth-child(9) { animation-delay: 0.32s; }
  .c-stagger .sq:nth-child(10) { animation-delay: 0.40s; }
  .c-stagger .sq:nth-child(11) { animation-delay: 0.16s; }
  .c-stagger .sq:nth-child(12) { animation-delay: 0.24s; }
  .c-stagger .sq:nth-child(13) { animation-delay: 0.32s; }
  .c-stagger .sq:nth-child(14) { animation-delay: 0.40s; }
  .c-stagger .sq:nth-child(15) { animation-delay: 0.48s; }
  .c-stagger .sq:nth-child(16) { animation-delay: 0.24s; }
  .c-stagger .sq:nth-child(17) { animation-delay: 0.32s; }
  .c-stagger .sq:nth-child(18) { animation-delay: 0.40s; }
  .c-stagger .sq:nth-child(19) { animation-delay: 0.48s; }
  .c-stagger .sq:nth-child(20) { animation-delay: 0.56s; }
  .c-stagger .sq:nth-child(21) { animation-delay: 0.32s; }
  .c-stagger .sq:nth-child(22) { animation-delay: 0.40s; }
  .c-stagger .sq:nth-child(23) { animation-delay: 0.48s; }
  .c-stagger .sq:nth-child(24) { animation-delay: 0.56s; }
  .c-stagger .sq:nth-child(25) { animation-delay: 0.64s; }
  @keyframes staggerPop { 0%, 100% { transform: scale(0.3); opacity: 0.3; } 50% { transform: scale(1); opacity: 1; } }

  /* Cell 9: 3D flip card */
  .c-flip { perspective: 400px; }
  .c-flip .flip-card {
    width: 80px; height: 100px;
    position: relative;
    transform-style: preserve-3d;
    animation: flipY 3s ease-in-out infinite;
  }
  .c-flip .flip-face {
    position: absolute; inset: 0;
    border-radius: 6px;
    backface-visibility: hidden;
    display: flex; align-items: center; justify-content: center;
    font-family: 'VT323', monospace; font-size: 24px;
  }
  .c-flip .flip-front { background: linear-gradient(135deg, #FF6B4A, #FFB446); color: #000; }
  .c-flip .flip-back { background: linear-gradient(135deg, #4488FF, #00DDAA); color: #000; transform: rotateY(180deg); }
  @keyframes flipY { 0%, 40% { transform: rotateY(0); } 50%, 90% { transform: rotateY(180deg); } }

  /* Cell 10: Wave line */
  .c-wave svg { width: 180px; height: 80px; overflow: visible; }
  .c-wave .wave-line { fill: none; stroke-width: 2; stroke-linecap: round; }
  .c-wave .w1 { stroke: rgba(255, 107, 74, 0.7); stroke-dasharray: 4 8; animation: waveDash 1.5s linear infinite; }
  .c-wave .w2 { stroke: rgba(0, 221, 170, 0.5); stroke-dasharray: 6 10; animation: waveDash 2s linear infinite reverse; }
  .c-wave .w3 { stroke: rgba(68, 136, 255, 0.6); stroke-dasharray: 5 12; animation: waveDash 2.5s linear infinite; }
  @keyframes waveDash { to { stroke-dashoffset: -60; } }

  /* Cell 11: Conic spinner */
  .c-conic .spinner {
    width: 90px; height: 90px;
    border-radius: 50%;
    background: conic-gradient(from 0deg, #FF6B4A, #FFB446, #00DDAA, #4488FF, #CC00FF, #FF6B4A);
    animation: spinSlow 3s linear infinite;
    position: relative;
  }
  .c-conic .spinner::after {
    content: '';
    position: absolute;
    inset: 6px;
    background: #0c0c10;
    border-radius: 50%;
  }

  /* Cell 12: Morphing blob */
  .c-morph .blob {
    width: 70px; height: 70px;
    background: linear-gradient(135deg, #CC00FF, #4488FF);
    animation: morphBlob 4s ease-in-out infinite;
    box-shadow: 0 0 30px rgba(204, 0, 255, 0.3);
  }
  @keyframes morphBlob {
    0%, 100% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
    25% { border-radius: 30% 60% 70% 40% / 50% 60% 30% 60%; }
    50% { border-radius: 50% 60% 40% 60% / 30% 40% 70% 60%; }
    75% { border-radius: 40% 30% 60% 50% / 60% 70% 40% 30%; }
  }

  /* Cells 13-24: More variants */
  /* Cell 13: Bouncing dots */
  .c-dots { gap: 10px; }
  .c-dots .d {
    width: 12px; height: 12px;
    border-radius: 50%;
    animation: dotJump 1.4s ease-in-out infinite;
  }
  .c-dots .d:nth-child(1) { background: #FF6B4A; animation-delay: 0s; box-shadow: 0 0 10px rgba(255,107,74,0.5); }
  .c-dots .d:nth-child(2) { background: #FFB446; animation-delay: 0.12s; box-shadow: 0 0 10px rgba(255,180,70,0.5); }
  .c-dots .d:nth-child(3) { background: #00DDAA; animation-delay: 0.24s; box-shadow: 0 0 10px rgba(0,221,170,0.5); }
  .c-dots .d:nth-child(4) { background: #4488FF; animation-delay: 0.36s; box-shadow: 0 0 10px rgba(68,136,255,0.5); }
  .c-dots .d:nth-child(5) { background: #CC00FF; animation-delay: 0.48s; box-shadow: 0 0 10px rgba(204,0,255,0.5); }
  @keyframes dotJump { 0%, 100% { transform: translateY(20px); } 50% { transform: translateY(-20px); } }

  /* Cell 14: Progress fill */
  .c-progress {
    flex-direction: column; gap: 8px; padding: 20px;
  }
  .c-progress .pbar {
    width: 100%; height: 6px;
    background: rgba(255,255,255,0.06);
    border-radius: 3px;
    overflow: hidden;
  }
  .c-progress .pfill {
    height: 100%;
    border-radius: 3px;
    animation: fillBar 2.5s ease-in-out infinite;
  }
  .c-progress .pbar:nth-child(1) .pfill { background: linear-gradient(90deg, #FF6B4A, #FFB446); animation-delay: 0s; }
  .c-progress .pbar:nth-child(2) .pfill { background: linear-gradient(90deg, #00DDAA, #4488FF); animation-delay: 0.3s; }
  .c-progress .pbar:nth-child(3) .pfill { background: linear-gradient(90deg, #CC00FF, #FF6B9D); animation-delay: 0.6s; }
  .c-progress .pbar:nth-child(4) .pfill { background: linear-gradient(90deg, #FFB446, #00DDAA); animation-delay: 0.9s; }
  @keyframes fillBar { 0% { width: 0; } 50% { width: 100%; } 100% { width: 0; } }

  /* Cell 15-16: Scale breathe + rotation variants */
  .c-breathe .breath-circle {
    width: 50px; height: 50px;
    border: 2px solid #FFB446;
    border-radius: 50%;
    animation: breathe 3s ease-in-out infinite;
    box-shadow: 0 0 20px rgba(255,180,70,0.2), inset 0 0 20px rgba(255,180,70,0.1);
  }
  .c-breathe .breath-circle:nth-child(2) {
    position: absolute;
    width: 80px; height: 80px;
    border-color: rgba(255,180,70,0.3);
    animation-delay: 0.5s;
  }
  .c-breathe .breath-circle:nth-child(3) {
    position: absolute;
    width: 110px; height: 110px;
    border-color: rgba(255,180,70,0.15);
    animation-delay: 1s;
  }
  @keyframes breathe { 0%, 100% { transform: scale(0.8); opacity: 0.6; } 50% { transform: scale(1.2); opacity: 1; } }

  /* Cell 16: Hexagon */
  .c-hex .hexagon {
    width: 70px; height: 80px;
    background: linear-gradient(135deg, #4488FF, #00DDAA);
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    animation: hexPulse 2s ease-in-out infinite;
    box-shadow: 0 0 20px rgba(68,136,255,0.3);
  }
  @keyframes hexPulse { 0%, 100% { transform: scale(0.8) rotate(0deg); } 50% { transform: scale(1.1) rotate(30deg); } }

  /* Cell 17-20: Triangle, diamond, cross-hair, waveform */
  .c-tri .triangle {
    width: 0; height: 0;
    border-left: 40px solid transparent;
    border-right: 40px solid transparent;
    border-bottom: 70px solid #FF6B9D;
    filter: drop-shadow(0 0 12px rgba(255,107,157,0.4));
    animation: triFloat 3s ease-in-out infinite;
  }
  @keyframes triFloat { 0%, 100% { transform: translateY(10px) rotate(-5deg); } 50% { transform: translateY(-10px) rotate(5deg); } }

  .c-diamond .diamond {
    width: 55px; height: 55px;
    background: linear-gradient(135deg, #FFB446, #FF6B4A);
    transform: rotate(45deg);
    border-radius: 4px;
    animation: diamondPulse 2.5s ease-in-out infinite;
    box-shadow: 0 0 24px rgba(255,180,70,0.4);
  }
  @keyframes diamondPulse { 0%, 100% { transform: rotate(45deg) scale(0.7); } 50% { transform: rotate(45deg) scale(1.1); } }

  .c-xhair .crosshair {
    width: 80px; height: 80px;
    position: relative;
    animation: spinSlow 6s linear infinite;
  }
  .c-xhair .crosshair::before, .c-xhair .crosshair::after {
    content: '';
    position: absolute;
    background: #33FF33;
    box-shadow: 0 0 6px rgba(51,255,51,0.4);
  }
  .c-xhair .crosshair::before { width: 100%; height: 1px; top: 50%; }
  .c-xhair .crosshair::after { width: 1px; height: 100%; left: 50%; }
  .c-xhair .ring-outer {
    position: absolute;
    width: 60px; height: 60px;
    border: 1px solid rgba(51,255,51,0.4);
    border-radius: 50%;
    top: 10px; left: 10px;
  }

  .c-waveform { padding: 10px; align-items: flex-end; gap: 2px; }
  .c-waveform .wb {
    width: 4px;
    background: #33FF33;
    border-radius: 1px;
    animation: wfBeat 1s ease-in-out infinite;
    box-shadow: 0 0 4px rgba(51,255,51,0.3);
  }
  .c-waveform .wb:nth-child(odd) { animation-direction: reverse; }

  @keyframes wfBeat { 0%, 100% { height: 15px; } 50% { height: 80px; } }

  /* Cell styling for specific cells */
  .c-bars, .c-dots, .c-waveform { display: flex; align-items: center; }

  /* Center label */
  .center-label {
    position: absolute;
    z-index: 20;
    grid-column: 3 / 5;
    grid-row: 2 / 4;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(8, 8, 12, 0.92);
    border: 1px solid rgba(255, 180, 70, 0.2);
    border-radius: 8px;
    padding: 30px;
    backdrop-filter: blur(8px);
    box-shadow: 0 0 60px rgba(255, 180, 70, 0.08);
  }

  .center-label h2 {
    font-family: 'VT323', monospace;
    font-size: 56px;
    color: #FFD080;
    letter-spacing: 0.08em;
    text-shadow: 0 0 20px rgba(255, 208, 128, 0.4), 3px 0 0 rgba(255,0,0,0.08), -3px 0 0 rgba(0,100,255,0.08);
    line-height: 1;
    margin-bottom: 8px;
  }

  .center-label .sub {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 16px;
    color: rgba(255, 255, 255, 0.3);
    letter-spacing: 0.1em;
  }

  /* CRT layers */
  .scanlines {
    position: absolute; inset: 0; z-index: 80;
    background: repeating-linear-gradient(to bottom, transparent 0px, transparent 2px, rgba(0,0,0,0.1) 2px, rgba(0,0,0,0.1) 4px);
    pointer-events: none;
  }
  .vignette {
    position: absolute; inset: 0; z-index: 85;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.5) 100%);
    pointer-events: none;
  }
  .bleed-bottom {
    position: absolute; bottom: 0; left: 0; width: 100%; height: 5px; z-index: 50;
    background: linear-gradient(90deg, rgba(255,107,74,0.5), rgba(255,180,70,0.4), rgba(0,221,170,0.5), rgba(68,136,255,0.4), rgba(204,0,255,0.5));
  }
  .bleed-top {
    position: absolute; top: 0; left: 0; width: 100%; height: 3px; z-index: 50;
    background: linear-gradient(90deg, rgba(204,0,255,0.4), rgba(0,221,170,0.5), rgba(255,107,74,0.4));
  }
</style>
</head>
<body>
  <div class="bg"></div>

  <div class="grid">
    <!-- Row 1 -->
    <div class="cell c-rotate"><div class="shape"></div></div>
    <div class="cell c-pulse"><div class="ring"></div><div class="dot"></div></div>
    <div class="cell c-bars"><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
    <div class="cell c-orbit"><div class="orbit-ring"><div class="orb-dot"></div></div><div class="orbit-ring"><div class="orb-dot"></div></div><div class="orbit-ring"><div class="orb-dot"></div></div></div>
    <div class="cell c-elastic"><div class="bounce-box"></div></div>
    <div class="cell c-gradient"><div class="grad-text">GSAP</div></div>

    <!-- Row 2 -->
    <div class="cell c-path">
      <svg viewBox="0 0 180 130">
        <path class="trace" d="M10,110 C40,10 80,130 120,50 S170,10 170,60"/>
        <path class="trail" d="M10,110 C40,10 80,130 120,50 S170,10 170,60"/>
        <circle class="tracer" cx="10" cy="110" r="4"/>
      </svg>
    </div>
    <div class="cell c-stagger"><div class="sq"></div><div class="sq"></div><div class="sq"></div><div class="sq"></div><div class="sq"></div><div class="sq"></div><div class="sq"></div><div class="sq"></div><div class="sq"></div><div class="sq"></div><div class="sq"></div><div class="sq"></div><div class="sq"></div><div class="sq"></div><div class="sq"></div><div class="sq"></div><div class="sq"></div><div class="sq"></div><div class="sq"></div><div class="sq"></div><div class="sq"></div><div class="sq"></div><div class="sq"></div><div class="sq"></div><div class="sq"></div></div>

    <!-- Center overlay label -->
    <div class="center-label">
      <h2>GSAP 3.14</h2>
      <div class="sub">ANIMATION ENGINE</div>
    </div>

    <div class="cell c-flip"><div class="flip-card"><div class="flip-face flip-front">&lt;/&gt;</div><div class="flip-face flip-back">MP4</div></div></div>
    <div class="cell c-wave">
      <svg viewBox="0 0 180 80">
        <path class="wave-line w1" d="M0,40 Q20,10 40,40 T80,40 T120,40 T160,40 T200,40"/>
        <path class="wave-line w2" d="M0,40 Q25,60 50,40 T100,40 T150,40 T200,40"/>
        <path class="wave-line w3" d="M0,40 Q15,20 30,40 T60,40 T90,40 T120,40 T150,40 T180,40"/>
      </svg>
    </div>

    <!-- Row 3 -->
    <div class="cell c-conic"><div class="spinner"></div></div>
