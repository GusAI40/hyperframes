<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Act 4 — How It Works (Install + Create)</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=VT323&family=IBM+Plex+Mono:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  .frame {
    width: 1920px;
    height: 1080px;
    position: relative;
    overflow: hidden;
    background: #050508;
  }

  /* ASCII background — green terminal */
  .ascii-bg {
    position: absolute; inset: 0;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px; line-height: 14px;
    color: #33FF33; opacity: 0.05;
    overflow: hidden; white-space: pre;
    pointer-events: none;
  }

  /* CRT overlays */
  .scanlines { position: absolute; inset: 0; background: repeating-linear-gradient(to bottom, transparent 0px, transparent 2px, rgba(0,0,0,0.12) 2px, rgba(0,0,0,0.12) 4px); pointer-events: none; z-index: 90; }
  .vignette { position: absolute; inset: 0; background: radial-gradient(ellipse at center, transparent 35%, rgba(0,0,0,0.55) 75%, rgba(0,0,0,0.85) 100%); pointer-events: none; z-index: 91; }
  .bleed-top, .bleed-bottom { position: absolute; left: 0; right: 0; height: 3px; z-index: 92; pointer-events: none; }
  .bleed-top { top: 0; background: linear-gradient(90deg, #33FF33 0%, #88BBFF 50%, #FFD080 100%); opacity: 0.4; }
  .bleed-bottom { bottom: 0; background: linear-gradient(90deg, #FFD080 0%, #88BBFF 50%, #33FF33 100%); opacity: 0.4; }

  .particles { position: absolute; inset: 0; z-index: 5; pointer-events: none; }
  .particle { position: absolute; width: 2px; height: 2px; border-radius: 50%; }

  /* ═══════════════════════════════════════════
     CONTENT: Two-command workflow
     ═══════════════════════════════════════════ */
  .content {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 10;
    gap: 60px;
  }

  .step {
    text-align: center;
  }

  .step-label {
    font-family: 'VT323', monospace;
    font-size: 28px;
    color: #88FFAA;
    opacity: 0.5;
    letter-spacing: 6px;
    margin-bottom: 16px;
  }

  /* Terminal command block */
  .cmd-block {
    background: rgba(51, 255, 51, 0.05);
    border: 1px solid rgba(51, 255, 51, 0.2);
    border-radius: 4px;
    padding: 20px 40px;
    display: inline-block;
  }
  .cmd {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 28px;
    line-height: 1.5;
  }
  .cmd .prompt {
    color: #33FF33;
    text-shadow: 0 0 8px rgba(51, 255, 51, 0.4);
  }
  .cmd .command {
    color: #33FF33;
    text-shadow: 0 0 8px rgba(51, 255, 51, 0.4);
  }
  .cmd .arg {
    color: #FFD080;
    text-shadow: 0 0 8px rgba(255, 208, 128, 0.3);
  }

  /* Slash command — different styling */
  .slash-block {
    background: rgba(255, 208, 128, 0.05);
    border: 1px solid rgba(255, 208, 128, 0.2);
    border-radius: 4px;
    padding: 20px 40px;
    display: inline-block;
  }
  .slash {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 28px;
    line-height: 1.5;
  }
  .slash .prefix {
    color: #FFD080;
    text-shadow: 0 0 8px rgba(255, 208, 128, 0.4);
  }
  .slash .natural {
    color: #ccc;
  }

  /* Divider */
  .step-divider {
    font-family: 'VT323', monospace;
    font-size: 36px;
    color: #333;
    letter-spacing: 12px;
  }

  /* Bottom: render output summary */
  .render-output {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    text-align: center;
  }
  .render-progress {
    width: 600px;
    height: 4px;
    background: rgba(51, 255, 51, 0.15);
    border-radius: 2px;
    margin-bottom: 12px;
  }
  .render-progress-fill {
    height: 100%;
    width: 100%;
    background: #33FF33;
    border-radius: 2px;
    box-shadow: 0 0 10px rgba(51, 255, 51, 0.5);
  }
  .render-status {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 16px;
    color: #33FF33;
    opacity: 0.6;
    letter-spacing: 2px;
  }
</style>
</head>
<body>
  <div class="frame">
    <div class="ascii-bg" id="asciiBg"></div>
    <div class="particles" id="particles"></div>

    <div class="content">
      <div class="step">
        <div class="step-label">ONE COMMAND TO INSTALL</div>
        <div class="cmd-block">
          <div class="cmd">
            <span class="prompt">$ </span><span class="command">hermes skills install </span><span class="arg">hyperframes</span>
          </div>
        </div>
      </div>

      <div class="step-divider">· · ·</div>

      <div class="step">
        <div class="step-label">ONE SLASH TO CREATE</div>
        <div class="slash-block">
          <div class="slash">
            <span class="prefix">/hyperframes </span><span class="natural">create a product launch video</span>
          </div>
        </div>
      </div>
    </div>

    <div class="render-output">
      <div class="render-progress"><div class="render-progress-fill"></div></div>
      <div class="render-status">✓ RENDERED · 1920×1080 · 30fps · H.264 · 14.2 MB</div>
    </div>

    <div class="scanlines"></div>
    <div class="vignette"></div>
    <div class="bleed-top"></div>
    <div class="bleed-bottom"></div>
  </div>

  <script>
    const chars = '$>_|/\\[]{}()#@!?*+-=~^&%;:.,01';
    const cols = 180; const rows = 80;
    let bg = '';
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) bg += chars[Math.floor(Math.random() * chars.length)];
      bg += '\n';
    }
    document.getElementById('asciiBg').textContent = bg;

    const colors = ['#33FF33', '#FFD080', '#88BBFF', '#CC00FF', '#00DDAA'];
    const container = document.getElementById('particles');
    for (let i = 0; i < 100; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + '%';
      p.style.top = Math.random() * 100 + '%';
      p.style.background = colors[Math.floor(Math.random() * colors.length)];
      p.style.opacity = 0.08 + Math.random() * 0.2;
      container.appendChild(p);
    }
  </script>
</body>
</html>
