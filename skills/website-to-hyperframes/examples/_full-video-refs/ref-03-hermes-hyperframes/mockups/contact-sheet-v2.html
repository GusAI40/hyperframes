<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Hermes × Hyperframes — Mockup Contact Sheet</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111;
    padding: 40px;
    font-family: -apple-system, sans-serif;
    color: #fff;
  }
  h1 {
    font-size: 24px;
    font-weight: 300;
    letter-spacing: 4px;
    color: #888;
    margin-bottom: 32px;
    text-transform: uppercase;
  }
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 32px;
  }
  .card {
    position: relative;
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 8px;
    overflow: hidden;
  }
  .card-label {
    padding: 12px 20px;
    background: #1a1a1a;
    font-size: 14px;
    color: #888;
    letter-spacing: 2px;
    border-bottom: 1px solid #333;
  }
  .card-label strong {
    color: #FFD080;
    font-weight: 500;
  }
  iframe {
    width: 100%;
    height: 540px;
    border: none;
    transform-origin: top left;
  }
</style>
</head>
<body>
  <h1>Hermes × Hyperframes — Mockup Contact Sheet</h1>
  <div class="grid">
    <div class="card">
      <div class="card-label"><strong>ACT 1</strong> — Boot / Skill Detection (0-6s)</div>
      <iframe src="act1-boot.html" style="transform: scale(0.5); width: 200%; height: 1080px;"></iframe>
    </div>
    <div class="card">
      <div class="card-label"><strong>ACT 2</strong> — What It Is: HTML → Video (6-12s)</div>
      <iframe src="act2-what-it-is.html" style="transform: scale(0.5); width: 200%; height: 1080px;"></iframe>
    </div>
    <div class="card">
      <div class="card-label"><strong>ACT 3</strong> — What It Makes: Showcase (12-24s)</div>
      <iframe src="act3-showcase.html" style="transform: scale(0.5); width: 200%; height: 1080px;"></iframe>
    </div>
    <div class="card">
      <div class="card-label"><strong>ACT 4</strong> — How It Works: Install + Create (24-30s)</div>
      <iframe src="act4-workflow.html" style="transform: scale(0.5); width: 200%; height: 1080px;"></iframe>
    </div>
  </div>
  <div class="grid" style="margin-top: 32px;">
    <div class="card" style="grid-column: 1 / -1;">
      <div class="card-label"><strong>ACT 5</strong> — Close / Branding (30-35s)</div>
      <iframe src="act5-close.html" style="transform: scale(0.5); width: 200%; height: 1080px;"></iframe>
    </div>
  </div>
</body>
</html>
