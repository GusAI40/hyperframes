<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>KF04 — Deploy / CTA</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=VT323&family=IBM+Plex+Mono:wght@400;600;700&display=swap');
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1920px;
    height: 1080px;
    background: #000;
    overflow: hidden;
    position: relative;
  }

  /* Radial burst — warm center glow */
  .burst {
    position: absolute;
    top: 42%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 2400px;
    height: 2400px;
    z-index: 1;
    background:
      radial-gradient(ellipse at center,
        rgba(255, 200, 100, 0.08) 0%,
        rgba(200, 150, 80, 0.05) 8%,
        rgba(150, 80, 200, 0.03) 18%,
        rgba(0, 100, 150, 0.02) 30%,
        transparent 50%
      );
  }

  /* Conic ray lines — subtle */
  .rays {
    position: absolute;
    top: 42%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 2400px;
    height: 2400px;
    z-index: 2;
    background: conic-gradient(from 0deg,
      transparent 0deg, rgba(255,200,100,0.012) 1.5deg, transparent 3deg,
      transparent 10deg, rgba(0,150,200,0.008) 11.5deg, transparent 13deg,
      transparent 20deg, rgba(200,100,255,0.01) 21.5deg, transparent 23deg,
      transparent 30deg, rgba(255,150,80,0.008) 31.5deg, transparent 33deg,
      transparent 40deg, rgba(0,200,150,0.01) 41.5deg, transparent 43deg,
      transparent 50deg, rgba(255,80,150,0.008) 51.5deg, transparent 53deg,
      transparent 60deg, rgba(100,150,255,0.012) 61.5deg, transparent 63deg,
      transparent 70deg, rgba(255,200,50,0.008) 71.5deg, transparent 73deg,
      transparent 80deg, rgba(150,0,200,0.01) 81.5deg, transparent 83deg,
      transparent 90deg, rgba(0,200,200,0.008) 91.5deg, transparent 93deg,
      transparent 100deg, rgba(255,100,50,0.012) 101.5deg, transparent 103deg,
      transparent 110deg, rgba(100,255,150,0.008) 111.5deg, transparent 113deg,
      transparent 120deg, rgba(200,150,255,0.01) 121.5deg, transparent 123deg,
      transparent 130deg, rgba(255,200,100,0.008) 131.5deg, transparent 133deg,
      transparent 140deg, rgba(0,150,255,0.01) 141.5deg, transparent 143deg,
      transparent 150deg, rgba(255,50,150,0.008) 151.5deg, transparent 153deg,
      transparent 160deg, rgba(150,200,0,0.01) 161.5deg, transparent 163deg,
      transparent 170deg, rgba(200,0,150,0.008) 171.5deg, transparent 173deg,
      transparent 180deg, rgba(0,200,100,0.012) 181.5deg, transparent 183deg,
      transparent 190deg, rgba(255,150,200,0.008) 191.5deg, transparent 193deg,
      transparent 200deg, rgba(100,100,255,0.01) 201.5deg, transparent 203deg,
      transparent 210deg, rgba(255,200,0,0.008) 211.5deg, transparent 213deg,
      transparent 220deg, rgba(0,255,200,0.01) 221.5deg, transparent 223deg,
      transparent 230deg, rgba(200,100,50,0.008) 231.5deg, transparent 233deg,
      transparent 240deg, rgba(50,200,255,0.01) 241.5deg, transparent 243deg,
      transparent 250deg, rgba(255,100,100,0.008) 251.5deg, transparent 253deg,
      transparent 260deg, rgba(100,255,100,0.01) 261.5deg, transparent 263deg,
      transparent 270deg, rgba(200,50,255,0.012) 271.5deg, transparent 273deg,
      transparent 280deg, rgba(255,200,150,0.008) 281.5deg, transparent 283deg,
      transparent 290deg, rgba(0,200,200,0.01) 291.5deg, transparent 293deg,
      transparent 300deg, rgba(255,100,0,0.008) 301.5deg, transparent 303deg,
      transparent 310deg, rgba(100,0,255,0.01) 311.5deg, transparent 313deg,
      transparent 320deg, rgba(200,255,0,0.008) 321.5deg, transparent 323deg,
      transparent 330deg, rgba(0,100,200,0.01) 331.5deg, transparent 333deg,
      transparent 340deg, rgba(255,0,100,0.008) 341.5deg, transparent 343deg,
      transparent 350deg, rgba(100,200,100,0.01) 351.5deg, transparent 353deg,
      transparent 360deg
    );
    animation: raysSpin 60s linear infinite;
  }
  @keyframes raysSpin { to { transform: translate(-50%, -50%) rotate(360deg); } }

  /* Noise particle field */
  .noise-field { position: absolute; inset: 0; z-index: 3; }
  .noise-dot {
    position: absolute;
    border-radius: 50%;
  }

  /* Main content — vertically centered */
  .content {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 20;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    width: 900px;
  }

  /* Dual logo lockup */
  .lockup {
    display: flex;
    align-items: center;
    gap: 48px;
    margin-bottom: 32px;
  }

  .logo-icon {
    width: 130px;
    height: 130px;
    border-radius: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    position: relative;
  }

  .logo-hf {
    background: rgba(20, 15, 5, 0.8);
    border: 1px solid rgba(255, 180, 70, 0.3);
    box-shadow: 0 0 50px rgba(255, 180, 70, 0.15), 0 0 100px rgba(255, 150, 50, 0.06);
  }
  .logo-hf::before {
    content: ''; position: absolute; inset: -3px; border-radius: 24px;
    border: 1px solid rgba(255, 50, 50, 0.12); transform: translate(2px, -1px);
  }
  .logo-hf::after {
    content: ''; position: absolute; inset: -3px; border-radius: 24px;
    border: 1px solid rgba(50, 100, 255, 0.1); transform: translate(-2px, 1px);
  }
  .logo-hf .icon-text {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 44px; font-weight: 700;
    color: #FFD080;
    text-shadow: 0 0 20px rgba(255,208,128,0.5), 3px 0 0 rgba(255,0,0,0.1), -3px 0 0 rgba(0,100,255,0.1);
  }

  .logo-nous {
    background: rgba(5, 10, 25, 0.8);
    border: 1px solid rgba(0, 120, 255, 0.3);
    box-shadow: 0 0 50px rgba(0, 120, 255, 0.15), 0 0 100px rgba(0, 80, 200, 0.06);
    gap: 2px;
  }
  .logo-nous::before {
    content: ''; position: absolute; inset: -3px; border-radius: 24px;
    border: 1px solid rgba(255, 80, 80, 0.08); transform: translate(2px, -1px);
  }
  .logo-nous::after {
    content: ''; position: absolute; inset: -3px; border-radius: 24px;
    border: 1px solid rgba(0, 200, 200, 0.08); transform: translate(-2px, 1px);
  }
  .logo-nous .icon-text {
    font-family: 'VT323', monospace;
    font-size: 34px; color: #88BBFF; letter-spacing: 0.12em;
    text-shadow: 0 0 20px rgba(136,187,255,0.5), 3px 0 0 rgba(255,0,0,0.06), -3px 0 0 rgba(0,200,200,0.06);
  }
  .logo-nous .icon-sub {
    font-family: 'VT323', monospace;
    font-size: 13px; color: rgba(136,187,255,0.35); letter-spacing: 0.18em;
  }

  .logo-x {
    font-family: 'VT323', monospace;
    font-size: 36px; color: rgba(255,255,255,0.1);
  }

  /* Brand labels */
  .brand-labels {
    display: flex;
    gap: 100px;
    margin-bottom: 40px;
  }

  .brand-label {
    font-family: 'VT323', monospace;
    font-size: 20px;
    letter-spacing: 0.15em;
    text-align: center;
    width: 130px;
  }

  .bl-hf { color: rgba(255,208,128,0.55); }
  .bl-nous { color: rgba(136,187,255,0.55); }

  /* Install command */
  .install-cmd {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 26px;
    font-weight: 600;
    padding: 16px 36px;
    background: rgba(0, 15, 0, 0.5);
    border: 1px solid rgba(51, 255, 51, 0.18);
    border-radius: 4px;
    margin-bottom: 14px;
    box-shadow: 0 0 30px rgba(51,255,51,0.04);
  }
  .install-cmd .prompt { color: rgba(51,255,51,0.35); }
  .install-cmd .cmd { color: rgba(0,220,170,0.8); text-shadow: 0 0 8px rgba(0,220,170,0.2); }
  .install-cmd .arg { color: #FFD080; text-shadow: 0 0 10px rgba(255,208,128,0.25); }

  /* Slash demo */
  .slash-demo {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 18px;
    margin-bottom: 48px;
  }
  .slash-demo .slash { color: rgba(255,180,70,0.55); }
  .slash-demo .natural { color: rgba(255,255,255,0.2); }

  /* Bottom meta */
  .bottom-meta { text-align: center; }
  .bottom-meta .line1 {
    font-family: 'VT323', monospace;
    font-size: 21px; letter-spacing: 0.15em; margin-bottom: 8px;
  }
  .bottom-meta .line1 .g { color: rgba(51,255,51,0.45); }
  .bottom-meta .line1 .dim { color: rgba(255,255,255,0.1); }
  .bottom-meta .line2 {
    font-family: 'VT323', monospace;
    font-size: 17px; color: rgba(255,255,255,0.1); letter-spacing: 0.1em;
  }

  /* CRT */
  .scanlines {
    position: absolute; inset: 0; z-index: 80;
    background: repeating-linear-gradient(to bottom, transparent 0px, transparent 1.5px, rgba(0,0,0,0.15) 1.5px, rgba(0,0,0,0.15) 3px);
    pointer-events: none;
  }
  .vignette {
    position: absolute; inset: 0; z-index: 85;
    background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.6) 100%);
    pointer-events: none;
  }
  .bleed-top {
    position: absolute; top: 0; left: 0; width: 100%; height: 3px; z-index: 90;
    background: linear-gradient(90deg, rgba(0,120,255,0.4), rgba(255,180,70,0.3), rgba(0,200,200,0.4));
  }
  .bleed-bottom {
    position: absolute; bottom: 0; left: 0; width: 100%; height: 5px; z-index: 90;
    background: linear-gradient(90deg, rgba(200,0,200,0.4), rgba(0,200,200,0.35), rgba(255,180,70,0.4), rgba(0,120,255,0.35));
    box-shadow: 0 0 16px rgba(200,0,200,0.15);
  }
</style>
</head>
<body>
  <div class="burst"></div>
  <div class="rays"></div>
  <div class="noise-field" id="noise"></div>

  <div class="content">
    <div class="lockup">
      <div class="logo-icon logo-hf"><div class="icon-text">&lt;/&gt;</div></div>
      <div class="logo-x">&times;</div>
      <div class="logo-icon logo-nous"><div class="icon-text">NOUS</div><div class="icon-sub">RESEARCH</div></div>
    </div>

    <div class="brand-labels">
      <div class="brand-label bl-hf">HYPERFRAMES</div>
      <div class="brand-label bl-nous">HERMES AGENT</div>
    </div>

    <div class="install-cmd">
      <span class="prompt">$ </span><span class="cmd">hermes skills install </span><span class="arg">hyperframes</span>
    </div>

    <div class="slash-demo">
      <span class="slash">/hyperframes</span> <span class="natural">create a product launch video</span>
    </div>

    <div class="bottom-meta">
      <div class="line1">
        <span class="g">OPEN SOURCE</span> <span class="dim">&bull;</span>
        <span class="g">MIT LICENSE</span> <span class="dim">&bull;</span>
        <span class="g">AGENTSKILLS.IO</span>
      </div>
      <div class="line2">WORKS WITH 35+ AGENTS &bull; CLAUDE CODE &bull; COPILOT &bull; CURSOR &bull; GEMINI CLI</div>
    </div>
  </div>

  <div class="scanlines"></div>
  <div class="vignette"></div>
  <div class="bleed-top"></div>
  <div class="bleed-bottom"></div>

  <script>
    const field = document.getElementById('noise');
    let s = 77;
    function rand() { s = (s * 1103515245 + 12345) & 0x7fffffff; return (s % 10000) / 10000; }
    const colors = ['255,200,100','100,180,255','200,100,255','0,200,170','255,100,150','150,255,100'];
    for (let i = 0; i < 100; i++) {
      const dot = document.createElement('div');
      dot.className = 'noise-dot';
      const x = rand() * 1920, y = rand() * 1080, sz = 1 + rand() * 2.5;
      const c = colors[Math.floor(rand() * colors.length)];
      const op = 0.08 + rand() * 0.2;
      dot.style.cssText = `left:${x}px;top:${y}px;width:${sz}px;height:${sz}px;background:rgba(${c},${op});box-shadow:0 0 ${sz*3}px rgba(${c},${op*0.4});`;
      field.appendChild(dot);
    }
  </script>
</body>
</html>
