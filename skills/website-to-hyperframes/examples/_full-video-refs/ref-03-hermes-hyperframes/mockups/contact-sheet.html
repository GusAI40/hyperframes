<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hermes x Hyperframes — Keyframe Contact Sheet</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111;
    padding: 40px;
    font-family: 'Courier New', monospace;
    color: #888;
  }
  h1 {
    text-align: center;
    font-size: 16px;
    letter-spacing: 0.3em;
    color: #555;
    margin-bottom: 32px;
    text-transform: uppercase;
  }
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    max-width: 1600px;
    margin: 0 auto;
  }
  .grid.three-col {
    grid-template-columns: 1fr 1fr 1fr;
  }
  .frame {
    position: relative;
  }
  .frame .label {
    font-size: 13px;
    letter-spacing: 0.15em;
    color: #666;
    margin-bottom: 8px;
  }
  .frame iframe {
    width: 100%;
    aspect-ratio: 1920 / 1080;
    border: 1px solid #333;
    background: #000;
    transform-origin: top left;
  }
</style>
</head>
<body>
  <h1>Hermes &times; Hyperframes &mdash; Visual Concept Keyframes</h1>
  <div class="grid">
    <div class="frame">
      <div class="label">KF01 — SKILL BOOT SEQUENCE (OPENING)</div>
      <iframe src="kf01-skill-boot.html" scrolling="no"></iframe>
    </div>
    <div class="frame">
      <div class="label">KF02 — BINARY BREAK (GLITCH TRANSITION)</div>
      <iframe src="kf02-binary-break.html" scrolling="no"></iframe>
    </div>
  </div>
  <h1 style="margin-top:32px;">Capabilities Sub-Beats (KF03)</h1>
  <div class="grid three-col">
    <div class="frame">
      <div class="label">KF03-A — GSAP ANIMATION GRID</div>
      <iframe src="kf03a-gsap-grid.html" scrolling="no"></iframe>
    </div>
    <div class="frame">
      <div class="label">KF03-B — SHADER / RENDER PIPELINE</div>
      <iframe src="kf03b-shader-render.html" scrolling="no"></iframe>
    </div>
    <div class="frame">
      <div class="label">KF03-C — LOTTIE / CAPTIONS / TEMPLATES</div>
      <iframe src="kf03c-lottie-captions.html" scrolling="no"></iframe>
    </div>
  </div>
  <h1 style="margin-top:32px;">Closer</h1>
  <div class="grid">
    <div class="frame">
      <div class="label">KF04 — DEPLOY / CTA (CLOSER)</div>
      <iframe src="kf04-deploy.html" scrolling="no"></iframe>
    </div>
  </div>
</body>
</html>
